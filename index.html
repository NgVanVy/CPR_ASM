<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiTech - Advanced Security E-commerce</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Open Sans', sans-serif; background-color: #f0f2f5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* GOOGLE STYLE INPUTS */
        .google-input-container { position: relative; width: 100%; }
        .google-input { display: block; width: 100%; padding: 14px 14px 10px 14px; font-size: 16px; color: #202124; background-color: transparent; border: 1px solid #dadce0; border-radius: 4px; appearance: none; }
        .google-input:focus { outline: none; border: 2px solid #1a73e8; padding: 13px 13px 9px 13px; }
        .google-label { position: absolute; font-size: 16px; color: #5f6368; background-color: #fff; padding: 0 4px; top: 50%; left: 10px; transform: translateY(-50%); transition: 0.2s ease all; pointer-events: none; }
        .google-input:focus ~ .google-label, .google-input:not(:placeholder-shown) ~ .google-label { top: 0; font-size: 12px; color: #1a73e8; }
        .google-input:not(:focus):not(:placeholder-shown) ~ .google-label { color: #5f6368; }
        
        .google-btn { background-color: #1a73e8; color: white; font-weight: 500; border-radius: 4px; padding: 10px 24px; transition: background-color 0.2s; }
        .google-btn:hover { background-color: #1557b0; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); }
        .google-btn:disabled { background-color: #e8eaed; color: #9aa0a6; cursor: not-allowed; box-shadow: none; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: center; z-index: 100; }

        /* Animations */
        @keyframes runAcross { 0% { transform: translateX(-100px) scaleX(1); } 49% { transform: translateX(105vw) scaleX(1); } 50% { transform: translateX(105vw) scaleX(-1); } 100% { transform: translateX(-100px) scaleX(-1); } }
        .animate-run-1 { animation: runAcross 18s linear infinite; display: inline-block; will-change: transform; }
        .animate-run-2 { animation: runAcross 22s linear infinite -5s; display: inline-block; will-change: transform; }
        .animate-run-3 { animation: runAcross 25s linear infinite -12s; display: inline-block; will-change: transform; }
        @keyframes walkBob { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-4px) rotate(4deg); } 50% { transform: translateY(0) rotate(0deg); } 75% { transform: translateY(-4px) rotate(-4deg); } }
        .animate-walk-bob { animation: walkBob 0.6s ease-in-out infinite; display: block; }
        @keyframes dance { 0%, 100% { transform: translateY(0) scale(1); } 25% { transform: translateY(-8px) scale(1.1) rotate(15deg); } 50% { transform: translateY(0) scale(1); } 75% { transform: translateY(-8px) scale(1.1) rotate(-15deg); } }
        .animate-dance { animation: dance 0.8s ease-in-out infinite; display: block; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } }
        .animate-float { animation: float 3s ease-in-out infinite; display: block; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const PRODUCTS = [
            // Danh mục Laptop
            { id: 1, name: 'MacBook Pro M3 Max 14"', price: 45990000, category: 'Laptop', icon: 'laptop', image: 'https://images.unsplash.com/photo-1517336712461-a5123d80fe4e?w=500&q=80' },
            { id: 2, name: 'Dell XPS 15 OLED', price: 39990000, category: 'Laptop', icon: 'laptop', image: 'https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=500&q=80' },
            { id: 3, name: 'ThinkPad X1 Carbon Gen 11', price: 35990000, category: 'Laptop', icon: 'laptop', image: 'https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=500&q=80' },
            { id: 13, name: 'ASUS ROG Zephyrus G14', price: 41990000, category: 'Laptop', icon: 'laptop', image: 'https://images.unsplash.com/photo-1599305445671-ac291c95aaa9?w=500&q=80' },
            // Danh mục Điện thoại
            { id: 4, name: 'iPhone 15 Pro Max 256GB', price: 29990000, category: 'Điện thoại', icon: 'smartphone', image: 'https://images.unsplash.com/photo-1696446701796-da61225697cc?w=500&q=80' },
            { id: 5, name: 'Samsung Galaxy S24 Ultra', price: 31990000, category: 'Điện thoại', icon: 'smartphone', image: 'https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=500&q=80' },
            { id: 6, name: 'Google Pixel 8 Pro', price: 24990000, category: 'Điện thoại', icon: 'smartphone', image: 'https://images.unsplash.com/photo-1598327105666-5b89351cb31b?w=500&q=80' },
            { id: 14, name: 'Xiaomi 14 Ultra', price: 27990000, category: 'Điện thoại', icon: 'smartphone', image: 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500&q=80' },
            // Danh mục Âm thanh
            { id: 7, name: 'Sony WH-1000XM5 ANC', price: 7490000, category: 'Âm thanh', icon: 'headphones', image: 'https://images.unsplash.com/photo-1618366712277-70778c392888?w=500&q=80' },
            { id: 8, name: 'AirPods Pro Gen 2', price: 5990000, category: 'Âm thanh', icon: 'headphones', image: 'https://images.unsplash.com/photo-1600294037681-c80b4cb5b434?w=500&q=80' },
            { id: 9, name: 'Marshall Motif A.N.C', price: 4990000, category: 'Âm thanh', icon: 'headphones', image: 'https://images.unsplash.com/photo-1583394838336-acd977736f90?w=500&q=80' },
            { id: 15, name: 'Bose QuietComfort Ultra', price: 8990000, category: 'Âm thanh', icon: 'headphones', image: 'https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=500&q=80' },
            // Danh mục Máy tính bảng & Phụ kiện
            { id: 10, name: 'iPad Pro M2 11-inch', price: 21490000, category: 'Máy tính bảng', icon: 'tablet', image: 'https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=500&q=80' },
            { id: 11, name: 'Samsung Galaxy Tab S9', price: 19990000, category: 'Máy tính bảng', icon: 'tablet', image: 'https://images.unsplash.com/photo-1589739900243-4b52cd9b104e?w=500&q=80' },
            { id: 12, name: 'Apple Watch Ultra 2', price: 19990000, category: 'Đồng hồ thông minh', icon: 'watch', image: 'https://images.unsplash.com/photo-1434493789847-2f02dc6ca35d?w=500&q=80' },
            { id: 16, name: 'Garmin Fenix 7X Pro', price: 22990000, category: 'Đồng hồ thông minh', icon: 'watch', image: 'https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1?w=500&q=80' },
        ];

        const INITIAL_USERS_DB = [
            { id: '1', email: 'admin@group3.com', password: 'admin', role: 'admin', mfaEnabled: true, phone: '0999999999', fullName: 'System Admin' },
            { id: '2', email: 'khachvip@gmail.com', password: '123', role: 'user', mfaEnabled: true, phone: '0988888888', fullName: 'Nguyễn Văn VIP' }
        ];

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [view, setView] = useState('shop'); 
            const [cart, setCart] = useState([]);
            
            // XAMPP: STATE QUẢN LÝ DỮ LIỆU TỪ MYSQL
            const [usersDB, setUsersDB] = useState([]);
            const [ordersDB, setOrdersDB] = useState([]);
            const [dbConnected, setDbConnected] = useState(false);

            // STATE QUẢN LÝ CÁC TÀI KHOẢN ĐÃ XÁC MINH LẦN ĐẦU
            const [verifiedEmails, setVerifiedEmails] = useState(() => {
                const saved = localStorage.getItem('hitech_verified_emails');
                return saved ? JSON.parse(saved) : ['admin@group3.com', 'khachvip@gmail.com'];
            });

            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('hitech_asm_session');
                return saved ? JSON.parse(saved) : { isLoggedIn: false, email: '', role: '', details: null };
            });
            const [authData, setAuthData] = useState({ email: '', phoneHint: '', isCheckout: false });

            // TẢI DỮ LIỆU TỪ API.PHP (MySQL)
            useEffect(() => {
                fetch('api.php?action=get_all')
                    .then(res => {
                        if (!res.ok) throw new Error("Không tìm thấy api.php");
                        return res.json();
                    })
                    .then(data => {
                        if(!data.error) {
                            setUsersDB(data.users || []);
                            setOrdersDB(data.orders || []);
                            setDbConnected(true);
                            console.log("✅ XAMPP MySQL Connected!");
                        } else throw new Error(data.error);
                    })
                    .catch(err => {
                        // Đổi console.error thành console.log để không báo lỗi đỏ khi chạy không có XAMPP
                        console.log("ℹ️ Hệ thống đang chạy ở chế độ Offline Mode (Không có máy chủ XAMPP). Sử dụng LocalStorage.");
                        // FALLBACK: Trở về dùng LocalStorage nếu XAMPP hỏng
                        const savedUsers = localStorage.getItem('hitech_asm_users_db');
                        const savedOrders = localStorage.getItem('hitech_asm_orders_db');
                        setUsersDB(savedUsers ? JSON.parse(savedUsers) : INITIAL_USERS_DB);
                        setOrdersDB(savedOrders ? JSON.parse(savedOrders) : []);
                        setDbConnected(false);
                    });
            }, []);

            // BACKUP DỮ LIỆU OFFLINE NẾU XAMPP MẤT KẾT NỐI
            useEffect(() => { if (!dbConnected && usersDB.length > 0) localStorage.setItem('hitech_asm_users_db', JSON.stringify(usersDB)); }, [usersDB, dbConnected]);
            useEffect(() => { if (!dbConnected && ordersDB.length > 0) localStorage.setItem('hitech_asm_orders_db', JSON.stringify(ordersDB)); }, [ordersDB, dbConnected]);
            useEffect(() => { localStorage.setItem('hitech_verified_emails', JSON.stringify(verifiedEmails)); }, [verifiedEmails]);

            // HÀM GỌI API AN TOÀN
            const safeFetch = (action, data) => {
                if (!dbConnected) return Promise.resolve(); // Bỏ qua nếu đang Offline
                return fetch(`api.php?action=${action}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
                }).catch(err => console.error("Lỗi Ghi MySQL:", err));
            };

            const totalPrice = useMemo(() => cart.reduce((sum, item) => sum + item.price, 0), [cart]);

            const handleLogout = () => { setUser({ isLoggedIn: false, email: '', role: '', details: null }); localStorage.removeItem('hitech_asm_session'); setView('shop'); setCart([]); };

            const processCheckout = () => {
                if (!user.isLoggedIn) { setView('login'); return; }
                const currentUserDetails = usersDB.find(u => u.email === user.email);
                if (currentUserDetails.role === 'user' && !currentUserDetails.mfaEnabled) {
                    alert("CẢNH BÁO BẢO MẬT: Bạn phải bật Xác minh 2 bước (MFA) mới được phép thanh toán!");
                    setView('profile'); return;
                }
                if (currentUserDetails && currentUserDetails.mfaEnabled) {
                    setAuthData({ email: user.email, phoneHint: '***' + (currentUserDetails.phone || '000').slice(-3), isCheckout: true });
                    setView('2fa');
                } else handleCheckoutSuccess(); 
            };

            const handleCheckoutSuccess = () => {
                const newOrder = {
                    id: 'ORD-' + Math.floor(1000 + Math.random() * 9000), email: user.email, items: cart.map(c => c.name),
                    total: totalPrice, date: new Date().toLocaleDateString('vi-VN'), status: 'Đang xử lý'
                };
                
                safeFetch('add_order', newOrder); // Gửi sang PHP
                setOrdersDB([newOrder, ...ordersDB]); // Cập nhật UI ngay lập tức
                
                setCart([]); setView('checkout_success');
            };

            const toggleUserMfa = () => {
                const updatedDB = usersDB.map(u => {
                    if (u.email === user.email) {
                        const updatedUser = { ...u, mfaEnabled: !u.mfaEnabled };
                        safeFetch('update_user', updatedUser); // Lưu vào MySQL
                        return updatedUser;
                    }
                    return u;
                });
                setUsersDB(updatedDB);
                const updatedUser = updatedDB.find(u => u.email === user.email);
                const newUserState = { ...user, details: updatedUser };
                setUser(newUserState);
                if (localStorage.getItem('hitech_asm_session')) localStorage.setItem('hitech_asm_session', JSON.stringify(newUserState));
            };

            const handleRegister = (newUser) => {
                safeFetch('add_user', newUser); // Lưu vào MySQL
                setUsersDB([...usersDB, newUser]);
                alert("Tạo tài khoản thành công! Vui lòng đăng nhập.");
                setView('login');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* NAVBAR */}
                    <nav className="bg-[#0f172a] text-white sticky top-0 z-40 shadow-xl overflow-hidden relative">
                        {/* Hiển thị Trạng thái Database */}
                        <div className="absolute top-1 right-2 text-[10px] font-bold z-50 flex items-center gap-1 opacity-70">
                            <span className={`w-2 h-2 rounded-full ${dbConnected ? 'bg-emerald-500' : 'bg-rose-500 animate-pulse'}`}></span>
                            {dbConnected ? 'MySQL Connected' : 'Offline Mode (No XAMPP)'}
                        </div>

                        <div className="absolute inset-0 pointer-events-none z-0 overflow-hidden">
                            <div className="absolute top-3 left-[10%] text-[#10b981]/20 animate-float" style={{animationDelay: '0s'}}><Icon name="shield-check" size={24} /></div>
                            <div className="absolute top-6 left-[25%] text-blue-400/20 animate-float" style={{animationDelay: '1s'}}><Icon name="laptop" size={20} /></div>
                            <div className="absolute top-2 left-[45%] text-rose-400/20 animate-float" style={{animationDelay: '2s'}}><Icon name="lock" size={28} /></div>
                            <div className="absolute top-8 left-[65%] text-purple-400/20 animate-float" style={{animationDelay: '0.5s'}}><Icon name="smartphone" size={22} /></div>
                            <div className="absolute top-4 left-[85%] text-yellow-400/20 animate-float" style={{animationDelay: '1.5s'}}><Icon name="database" size={26} /></div>
                            <div className="absolute top-5 left-[95%] text-emerald-400/20 animate-float" style={{animationDelay: '0.8s'}}><Icon name="cpu" size={24} /></div>

                            <div className="absolute inset-0 flex items-center">
                                <div className="absolute animate-run-1"><img src="https://img.icons8.com/color/48/capybara.png" className="w-10 h-10 opacity-80 animate-walk-bob" /></div>
                                <div className="absolute animate-run-2"><img src="https://img.icons8.com/color/48/cat.png" className="w-9 h-9 opacity-80 animate-dance" /></div>
                                <div className="absolute animate-run-3"><img src="https://img.icons8.com/color/48/dog.png" className="w-9 h-9 opacity-80 animate-dance" /></div>
                            </div>
                        </div>

                        <div className="container mx-auto px-6 py-4 flex justify-between items-center relative z-10">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('shop')}>
                                <div className="bg-white p-1 rounded-lg flex items-center justify-center shadow-sm"><img src="https://img.icons8.com/color/48/capybara.png" className="w-8 h-8" /></div>
                                <h1 className="text-xl font-bold tracking-tighter uppercase hidden sm:block">Hi<span className="text-[#10b981]">Tech</span></h1>
                            </div>
                            
                            <div className="flex items-center gap-4 sm:gap-6 relative z-10">
                                {user.isLoggedIn && user.role === 'admin' && (
                                    <button onClick={() => setView('admin')} className="flex items-center gap-2 bg-rose-500 hover:bg-rose-600 px-3 py-1.5 rounded-full text-sm font-bold shadow-md"><Icon name="database" size={16} /> <span className="hidden sm:inline">Admin Panel</span></button>
                                )}

                                {user.isLoggedIn ? (
                                    <button onClick={() => setView('profile')} className="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 font-bold text-sm bg-slate-800 px-4 py-2 rounded-full border border-emerald-500/30"><Icon name="user" size={18} /><span>{user.details?.fullName || user.email.split('@')[0]}</span></button>
                                ) : (
                                    <button onClick={() => setView('login')} className="flex items-center gap-2 text-slate-300 hover:text-white transition-colors text-sm font-bold uppercase tracking-wider"><Icon name="log-in" size={20} /> Đăng Nhập / Đăng Ký</button>
                                )}
                                
                                <button onClick={() => setView('cart')} className="relative p-2.5 bg-slate-800 rounded-full hover:bg-slate-700 transition-all border border-slate-700 shadow-xl">
                                    <Icon name="shopping-cart" size={20} className="text-[#10b981]" />
                                    {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#0f172a] shadow-lg">{cart.length}</span>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow container mx-auto px-4 sm:px-6 py-10">
                        {view === 'shop' && <ShopView cart={cart} setCart={setCart} />}
                        {view === 'cart' && <CartView cart={cart} setCart={setCart} total={totalPrice} onCheckout={processCheckout} onBack={() => setView('shop')} />}
                        
                        {view === 'login' && <GoogleAuthFlow 
                            usersDB={usersDB} 
                            verifiedEmails={verifiedEmails}
                            setVerifiedEmails={setVerifiedEmails}
                            onNext={(data) => { setAuthData(data); setView('2fa'); }} 
                            onBypassLogin={(u, rememberMe) => { 
                                const newUser = { isLoggedIn: true, email: u.email, role: u.role, details: u };
                                setUser(newUser); 
                                if(rememberMe) localStorage.setItem('hitech_asm_session', JSON.stringify(newUser));
                                setView(u.role === 'admin' ? 'admin' : 'shop'); 
                            }} 
                            onGoRegister={() => setView('register')} 
                        />}
                        
                        {view === 'register' && <GoogleRegisterView onRegister={handleRegister} onBack={() => setView('login')} usersDB={usersDB} />}
                        
                        {view === '2fa' && <GoogleLoginStep2 authData={authData} onSuccess={() => { 
                            if (authData.isCheckout) { handleCheckoutSuccess(); } 
                            else {
                                const foundUser = usersDB.find(u => u.email === authData.email);
                                const newUser = { isLoggedIn: true, email: foundUser.email, role: foundUser.role, details: foundUser };
                                setUser(newUser); 
                                localStorage.setItem('hitech_asm_session', JSON.stringify(newUser));
                                setView(foundUser.role === 'admin' ? 'admin' : 'shop'); 
                            }
                        }} onCancel={() => setView(authData.isCheckout ? 'cart' : 'login')} />}
                        
                        {view === 'profile' && <CustomerDashboard user={user} ordersDB={ordersDB} onToggleMfa={toggleUserMfa} onLogout={handleLogout} />}
                        {view === 'admin' && <AdminDashboard usersDB={usersDB} setUsersDB={setUsersDB} ordersDB={ordersDB} safeFetch={safeFetch} />}
                        {view === 'checkout_success' && <CheckoutSuccessView onBack={() => setView('profile')} />}
                    </main>
                </div>
            );
        }

        // ==========================================
        // CÁC COMPONENT CỬA HÀNG
        // ==========================================
        function ShopView({ cart, setCart }) {
            // Tự động phân loại sản phẩm dựa trên thuộc tính 'category'
            const categories = [...new Set(PRODUCTS.map(p => p.category))];

            return (
                <div className="animate-fade-in">
                    {/* Banner Khuyến mãi 8/3 rực rỡ */}
                    <div className="mb-12 relative bg-gradient-to-r from-pink-500 via-rose-400 to-pink-500 p-8 sm:p-10 rounded-[32px] shadow-xl overflow-hidden border border-pink-200">
                        {/* Họa tiết mờ làm background banner */}
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" style={{ backgroundImage: "radial-gradient(#fff 2px, transparent 2px)", backgroundSize: "30px 30px" }}></div>
                        
                        <div className="relative z-10 text-center">
                            <h2 className="text-3xl sm:text-5xl font-black text-white mb-4 uppercase drop-shadow-md flex justify-center items-center gap-3">
                                <Icon name="gift" size={40} className="text-pink-100 hidden sm:block" />
                                Mừng Quốc Tế Phụ Nữ 8/3
                                <Icon name="heart" size={40} className="text-pink-100 hidden sm:block" />
                            </h2>
                            <p className="text-pink-50 font-semibold text-lg sm:text-xl drop-shadow-sm max-w-3xl mx-auto mb-8">
                                Tôn vinh phái đẹp! Giảm ngay <span className="text-yellow-300 font-black text-3xl mx-1">20%</span> cho tất cả các thiết bị công nghệ. Tặng kèm gói bảo mật giao dịch MFA trọn đời!
                            </p>
                            <div className="inline-flex items-center gap-4 bg-white/20 backdrop-blur-md border border-white/50 text-white font-black px-6 py-3 rounded-full shadow-lg text-lg uppercase tracking-widest cursor-pointer hover:bg-white/30 transition-colors" onClick={() => alert("Mã đã được lưu vào bộ nhớ tạm!")}>
                                <span>MÃ: <span className="text-yellow-300">WOMENDAY20</span></span>
                                <Icon name="copy" size={20} />
                            </div>
                        </div>
                    </div>
                    
                    {categories.map(category => {
                        const categoryProducts = PRODUCTS.filter(p => p.category === category);
                        const categoryIcon = categoryProducts[0].icon;

                        return (
                            <div key={category} className="mb-12">
                                <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2 border-b-2 border-slate-200 pb-2 inline-flex">
                                    <Icon name={categoryIcon} className="text-[#10b981]" /> {category}
                                </h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {categoryProducts.map(p => (
                                        <div key={p.id} className="bg-white rounded-3xl overflow-hidden border border-slate-200 shadow-sm hover:shadow-xl transition-all p-4 group flex flex-col">
                                            <div className="overflow-hidden rounded-2xl mb-4 h-48 bg-slate-50 flex items-center justify-center">
                                                <img src={p.image} alt={p.name} className="h-full w-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                            </div>
                                            <h4 className="font-bold text-slate-800 mb-1 line-clamp-2 min-h-[3rem]">{p.name}</h4>
                                            <p className="text-xl font-black text-slate-900 mb-4 mt-auto">{p.price.toLocaleString()} ₫</p>
                                            <button onClick={() => setCart([...cart, {...p, cartId: Math.random()}])} className="mt-auto w-full py-3 bg-[#0f172a] text-white font-bold rounded-xl hover:bg-[#10b981] flex items-center justify-center gap-2 text-sm transition-colors"><Icon name="shopping-cart" size={16} /> Thêm vào giỏ</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function CartView({ cart, setCart, total, onCheckout, onBack }) {
            return (
                <div className="max-w-3xl mx-auto bg-white p-6 sm:p-8 rounded-3xl shadow-xl border border-slate-100 animate-fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-black flex items-center gap-2"><Icon name="shopping-cart" className="text-emerald-500"/> Giỏ hàng</h2>
                        <button onClick={onBack} className="text-sm font-bold text-slate-500 hover:text-slate-800 underline">Tiếp tục mua sắm</button>
                    </div>
                    {cart.length === 0 ? <p className="text-slate-400 text-center py-10">Giỏ hàng trống.</p> : (
                        <div>
                            {cart.map(item => (
                                <div key={item.cartId} className="flex justify-between items-center border-b border-slate-100 py-4">
                                    <div className="flex items-center gap-4"><img src={item.image} className="w-12 h-12 rounded-lg object-cover hidden sm:block" /><span className="font-bold text-slate-700 text-sm sm:text-base">{item.name}</span></div>
                                    <div className="flex items-center gap-4 sm:gap-6"><span className="font-black text-emerald-600">{item.price.toLocaleString()} ₫</span><button onClick={() => setCart(cart.filter(c => c.cartId !== item.cartId))} className="text-rose-400 hover:text-rose-600 p-2"><Icon name="trash-2" size={18}/></button></div>
                                </div>
                            ))}
                            <div className="mt-8 flex flex-col sm:flex-row justify-between items-center text-xl bg-slate-50 p-6 rounded-2xl gap-4">
                                <span className="font-bold text-slate-500 uppercase text-sm tracking-widest">Tổng thanh toán:</span><span className="font-black text-3xl text-rose-500">{total.toLocaleString()} ₫</span>
                            </div>
                            <button onClick={onCheckout} className="w-full mt-6 py-5 bg-[#1a73e8] text-white font-bold rounded-xl text-base sm:text-lg hover:bg-[#1557b0] transition-colors shadow-lg flex justify-center items-center gap-2"><Icon name="lock" /> XÁC THỰC BẢO MẬT & THANH TOÁN</button>
                        </div>
                    )}
                </div>
            );
        }

        function GoogleAuthFlow({ usersDB, verifiedEmails, setVerifiedEmails, onNext, onBypassLogin, onGoRegister }) {
            const [step, setStep] = useState('chooser'); 
            const [otpValue, setOtpValue] = useState('');
            // State mới để lưu phương thức và giá trị người dùng nhập
            const [contactMode, setContactMode] = useState(''); 
            const [contactValue, setContactValue] = useState('');

            const [savedAccounts, setSavedAccounts] = useState(() => { const saved = localStorage.getItem('hitech_saved_accounts'); return saved ? JSON.parse(saved) : []; });
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            useEffect(() => { if (savedAccounts.length === 0 && step === 'chooser') setStep('email'); }, [savedAccounts, step]);

            const saveAccountToLocal = (userEmail, userFullName) => {
                const newAcc = { email: userEmail, fullName: userFullName };
                const updated = [newAcc, ...savedAccounts.filter(acc => acc.email !== userEmail)];
                setSavedAccounts(updated); localStorage.setItem('hitech_saved_accounts', JSON.stringify(updated));
            };

            const removeAccount = (emailToRemove) => {
                const updated = savedAccounts.filter(acc => acc.email !== emailToRemove);
                setSavedAccounts(updated); localStorage.setItem('hitech_saved_accounts', JSON.stringify(updated));
            };

            const handleLogin = (e) => {
                e.preventDefault(); setLoading(true); setError('');
                setTimeout(() => {
                    const foundUser = usersDB.find(u => u.email === email && u.password === password);
                    if (!foundUser) { setError('Mật khẩu không chính xác hoặc tên đăng nhập không tồn tại.'); setLoading(false); return; }
                    
                    saveAccountToLocal(foundUser.email, foundUser.fullName || foundUser.email.split('@')[0]);

                    // KIỂM TRA ĐĂNG NHẬP LẦN ĐẦU (THIẾT BỊ MỚI)
                    if (!verifiedEmails.includes(foundUser.email)) {
                        setStep('first_time_chooser');
                        setLoading(false);
                        return;
                    }

                    if (foundUser.mfaEnabled) { onNext({ email: foundUser.email, phoneHint: '***' + (foundUser.phone || '000').slice(-3), isCheckout: false }); } 
                    else { alert("CẢNH BÁO: Tài khoản này chưa bật MFA. Cho phép đăng nhập thẳng."); onBypassLogin(foundUser, true); }
                    setLoading(false);
                }, 800);
            };

            // GIAO DIỆN XÁC MINH LẦN ĐẦU
            if (step === 'first_time_chooser') {
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10 bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm text-center">
                        <div className="w-16 h-16 bg-[#e8f0fe] text-[#1a73e8] rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="shield-alert" size={32}/></div>
                        <h1 className="text-2xl font-medium text-[#202124] mb-2">Đăng nhập lần đầu</h1>
                        <p className="text-[#5f6368] text-sm mb-6">Đây là lần đầu tiên bạn đăng nhập. Để bảo vệ tài khoản, vui lòng chọn cách nhận mã xác minh:</p>
                        
                        <div className="space-y-3">
                            <button onClick={() => { setError(''); setContactValue(''); setContactMode('zalo'); setStep('first_time_input'); }} className="w-full py-3.5 bg-blue-50 text-blue-700 font-bold rounded-xl hover:bg-blue-100 flex items-center justify-center gap-3 transition-colors border border-blue-200"><Icon name="message-square" size={18}/> Gửi mã qua Zalo ZNS</button>
                            <button onClick={() => { setError(''); setContactValue(''); setContactMode('email'); setStep('first_time_input'); }} className="w-full py-3.5 bg-rose-50 text-rose-700 font-bold rounded-xl hover:bg-rose-100 flex items-center justify-center gap-3 transition-colors border border-rose-200"><Icon name="mail" size={18}/> Gửi mã qua Email / Gmail</button>
                            <button onClick={() => { setError(''); setContactValue(''); setContactMode('sms'); setStep('first_time_input'); }} className="w-full py-3.5 bg-emerald-50 text-emerald-700 font-bold rounded-xl hover:bg-emerald-100 flex items-center justify-center gap-3 transition-colors border border-emerald-200"><Icon name="message-circle" size={18}/> Gửi mã SMS về điện thoại</button>
                        </div>
                        <button onClick={() => setStep('pwd')} className="mt-6 text-[#5f6368] font-medium text-sm hover:underline">Quay lại</button>
                    </div>
                );
            }

            // GIAO DIỆN NHẬP SĐT HOẶC EMAIL ĐỂ ĐỐI CHIẾU
            if (step === 'first_time_input') {
                const isEmail = contactMode === 'email';
                const label = isEmail ? 'Nhập địa chỉ Email của bạn' : 'Nhập số điện thoại của bạn';
                const inputType = isEmail ? 'email' : 'text';
                
                const handleVerifyContact = (e) => {
                    e.preventDefault();
                    setError('');
                    const foundUser = usersDB.find(u => u.email === email);
                    if (!foundUser) return;

                    // Kiểm tra xem dữ liệu người dùng nhập có khớp với Database không
                    if (isEmail) {
                        if (contactValue !== foundUser.email) {
                            setError('Email không khớp với thông tin tài khoản đã đăng ký.');
                            return;
                        }
                    } else {
                        if (contactValue !== foundUser.phone) {
                            setError('Số điện thoại không khớp với thông tin tài khoản đã đăng ký.');
                            return;
                        }
                    }
                    
                    // Nếu khớp, cho phép đi tiếp
                    alert(`Hệ thống đã gửi mã OTP (123456) đến ${contactValue}`);
                    setOtpValue('');
                    setStep('first_time_otp');
                };

                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10 bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm text-center">
                        <div className="w-16 h-16 bg-[#e8f0fe] text-[#1a73e8] rounded-full flex items-center justify-center mx-auto mb-4"><Icon name={isEmail ? "mail" : "smartphone"} size={32}/></div>
                        <h1 className="text-2xl font-medium mb-4 text-[#202124]">Xác nhận thông tin</h1>
                        <p className="text-[#5f6368] text-sm mb-6">
                            Vui lòng nhập chính xác {isEmail ? 'email' : 'số điện thoại'} đã đăng ký với tài khoản này để nhận mã xác minh.
                        </p>
                        <form onSubmit={handleVerifyContact} className="space-y-6">
                            <div className="google-input-container">
                                <input type={inputType} value={contactValue} onChange={e => setContactValue(e.target.value)} placeholder=" " className="google-input" required autoFocus/>
                                <label className="google-label">{label}</label>
                            </div>
                            {error && <div className="text-[#d93025] text-xs font-medium text-left flex items-center gap-1"><Icon name="alert-circle" size={14}/> {error}</div>}
                            <div className="flex justify-between items-center pt-2">
                                <button type="button" onClick={() => {setError(''); setStep('first_time_chooser')}} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-3 py-2 rounded -ml-3">Quay lại</button>
                                <button type="submit" className="google-btn">Gửi mã</button>
                            </div>
                        </form>
                    </div>
                );
            }

            if (step === 'first_time_otp') {
                 return (
                     <div className="max-w-[450px] mx-auto animate-fade-in mt-10 bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm text-center">
                        <h1 className="text-2xl font-medium mb-4 text-[#202124]">Nhập mã xác minh</h1>
                        <p className="text-[#5f6368] text-sm mb-6">Mã bảo mật gồm 6 chữ số đã được gửi cho bạn.</p>
                        <form onSubmit={(e) => {
                            e.preventDefault();
                            if (otpValue === '123456') {
                                setVerifiedEmails([...verifiedEmails, email]); // Lưu vào danh sách đã xác minh
                                const foundUser = usersDB.find(u => u.email === email);
                                alert("Thiết bị đã được xác minh an toàn!");
                                if (foundUser.mfaEnabled) {
                                    onNext({ email: foundUser.email, phoneHint: '***' + (foundUser.phone || '000').slice(-3), isCheckout: false });
                                } else {
                                    onBypassLogin(foundUser, true);
                                }
                            } else {
                                setError('Mã xác minh không chính xác. Vui lòng nhập 123456');
                            }
                        }} className="space-y-6">
                            <div className="google-input-container">
                                <input type="text" maxLength="6" value={otpValue} onChange={e => setOtpValue(e.target.value)} placeholder=" " className="google-input" required autoFocus/>
                                <label className="google-label">Nhập mã (123456)</label>
                            </div>
                            {error && <div className="text-[#d93025] text-xs font-medium">{error}</div>}
                            <div className="flex justify-between items-center pt-2">
                                <button type="button" onClick={() => setStep('first_time_chooser')} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-3 py-2 rounded">Thử cách khác</button>
                                <button type="submit" className="google-btn">Tiếp tục</button>
                            </div>
                        </form>
                     </div>
                 );
            }

            if (step === 'chooser') {
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10">
                        <div className="bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm text-center">
                            <h1 className="text-2xl font-medium text-[#202124] mb-2">Chọn tài khoản</h1>
                            <p className="text-[#5f6368] text-base mb-6">để tiếp tục đến HiTech Store</p>
                            <ul className="text-left mb-4">
                                {savedAccounts.map(acc => (
                                    <li key={acc.email} className="flex items-center justify-between p-3 border-b border-[#dadce0] hover:bg-[#f8f9fa] cursor-pointer group transition-colors">
                                        <div className="flex items-center gap-3 w-full" onClick={() => { setEmail(acc.email); setStep('pwd'); }}><div className="w-8 h-8 rounded-full bg-[#1a73e8] text-white flex items-center justify-center font-bold text-sm">{acc.fullName.charAt(0).toUpperCase()}</div><div className="overflow-hidden"><p className="text-sm font-medium text-[#3c4043] truncate">{acc.fullName}</p><p className="text-xs text-[#5f6368] truncate">{acc.email}</p></div></div>
                                        <button onClick={(e) => { e.stopPropagation(); removeAccount(acc.email); }} className="text-[#5f6368] hover:text-[#d93025] opacity-0 group-hover:opacity-100 p-2"><Icon name="x" size={18}/></button>
                                    </li>
                                ))}
                                <li onClick={() => { setEmail(''); setStep('email'); }} className="flex items-center gap-3 p-4 hover:bg-[#f8f9fa] cursor-pointer border-b border-[#dadce0]"><Icon name="user-plus" size={20} className="text-[#5f6368]"/><p className="text-sm font-medium text-[#3c4043]">Sử dụng một tài khoản khác</p></li>
                            </ul>
                            <div className="text-left"><button type="button" onClick={onGoRegister} className="text-[#1a73e8] font-medium text-sm hover:underline">Tạo tài khoản mới</button></div>
                        </div>
                    </div>
                );
            }
            if (step === 'email') {
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10">
                        <div className="bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm">
                            <div className="text-center mb-8"><div className="flex justify-center mb-4"><img src="https://img.icons8.com/color/48/capybara.png" className="w-12 h-12" /></div><h1 className="text-2xl font-medium text-[#202124] mb-2">Đăng nhập</h1></div>
                            <form onSubmit={(e) => { e.preventDefault(); if(email) setStep('pwd'); }} className="space-y-5">
                                <div className="google-input-container"><input type="email" id="gEmail" placeholder=" " value={email} onChange={e => setEmail(e.target.value)} className="google-input" required autoFocus/><label htmlFor="gEmail" className="google-label">Email hoặc số điện thoại</label></div>
                                <div className="flex justify-between items-center pt-8"><button type="button" onClick={onGoRegister} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-2 py-2 rounded -ml-2">Tạo tài khoản</button><button type="submit" className="google-btn">Tiếp theo</button></div>
                            </form>
                        </div>
                    </div>
                );
            }
            if (step === 'pwd') {
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10">
                        <div className="bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm">
                            <div className="text-center mb-8"><h1 className="text-2xl font-medium text-[#202124] mb-2">Chào mừng</h1><div className="inline-flex items-center gap-2 border border-[#dadce0] px-3 py-1 rounded-full cursor-pointer hover:bg-gray-50" onClick={() => setStep(savedAccounts.length > 0 ? 'chooser' : 'email')}><span className="text-sm font-medium text-[#3c4043]">{email}</span></div></div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div className="google-input-container"><input type="password" id="gPass" placeholder=" " value={password} onChange={e => setPassword(e.target.value)} className="google-input" required autoFocus/><label htmlFor="gPass" className="google-label">Nhập mật khẩu của bạn</label></div>
                                {error && <div className="text-[#d93025] text-xs flex items-center gap-1"><Icon name="alert-circle" size={14}/> {error}</div>}
                                <div className="flex justify-between items-center pt-6">
                                    {/* FIX: Thêm type="button" và xóa error khi bấm Quên mật khẩu */}
                                    <button type="button" onClick={() => { setError(''); setStep('recovery') }} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-2 py-2 rounded -ml-2">Bạn quên mật khẩu?</button>
                                    <button type="submit" disabled={loading} className="google-btn">{loading ? 'Đang tải...' : 'Tiếp theo'}</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            // GIAO DIỆN KHÔI PHỤC TÀI KHOẢN ĐƯỢC NÂNG CẤP ĐẦY ĐỦ TÙY CHỌN
            if (step === 'recovery') {
                return (
                    <div className="max-w-[700px] mx-auto animate-fade-in mt-10 bg-[#1f1f1f] text-white p-10 rounded-2xl flex flex-col md:flex-row gap-10">
                        <div className="flex-1">
                            <h1 className="text-3xl font-medium mb-6">Khôi phục tài khoản</h1>
                            <div className="inline-flex items-center gap-2 border border-gray-600 bg-black/30 px-3 py-1.5 rounded-full cursor-pointer hover:bg-gray-800" onClick={() => { setError(''); setStep('email'); }}>
                                <Icon name="user-circle" size={18} className="text-gray-400"/>
                                <span className="text-sm font-medium">{email || 'khách_hàng@gmail.com'}</span>
                                <Icon name="chevron-down" size={14} className="text-gray-400"/>
                            </div>
                        </div>
                        <div className="flex-1">
                            <ul className="space-y-3">
                                <li onClick={() => { setError(''); setStep('pwd'); }} className="flex items-start gap-4 p-4 hover:bg-gray-800 rounded-xl cursor-pointer border border-gray-700 transition-colors">
                                    <Icon name="lock" size={20} className="mt-1 text-gray-400"/>
                                    <div><p className="text-base font-medium">Nhập mật khẩu của bạn</p></div>
                                </li>
                                <li onClick={() => { setError(''); setStep('zalo_qr'); }} className="flex items-start gap-4 p-4 hover:bg-gray-800 rounded-xl cursor-pointer border border-blue-500/30 bg-blue-500/10 transition-colors">
                                    <Icon name="qr-code" size={20} className="mt-1 text-blue-400"/>
                                    <div><p className="text-base font-medium text-blue-300">Quét mã QR Zalo (Siêu tốc)</p></div>
                                </li>
                                <li onClick={() => { setError(''); setContactValue(''); setContactMode('zalo'); setStep('recovery_input'); }} className="flex items-start gap-4 p-4 hover:bg-gray-800 rounded-xl cursor-pointer border border-gray-700 transition-colors">
                                    <Icon name="message-square" size={20} className="mt-1 text-blue-400"/>
                                    <div><p className="text-base font-medium">Nhận mã qua Zalo ZNS</p></div>
                                </li>
                                <li onClick={() => { setError(''); setContactValue(''); setContactMode('email'); setStep('recovery_input'); }} className="flex items-start gap-4 p-4 hover:bg-gray-800 rounded-xl cursor-pointer border border-gray-700 transition-colors">
                                    <Icon name="mail" size={20} className="mt-1 text-rose-400"/>
                                    <div><p className="text-base font-medium">Nhận mã qua Email / Gmail</p></div>
                                </li>
                                <li onClick={() => { setError(''); setContactValue(''); setContactMode('sms'); setStep('recovery_input'); }} className="flex items-start gap-4 p-4 hover:bg-gray-800 rounded-xl cursor-pointer border border-gray-700 transition-colors">
                                    <Icon name="message-circle" size={20} className="mt-1 text-emerald-400"/>
                                    <div><p className="text-base font-medium">Nhận mã SMS về điện thoại</p></div>
                                </li>
                            </ul>
                        </div>
                    </div>
                );
            }

            // GIAO DIỆN NHẬP SĐT HOẶC EMAIL ĐỂ KHÔI PHỤC (MỚI)
            if (step === 'recovery_input') {
                const isEmail = contactMode === 'email';
                const label = isEmail ? 'Nhập địa chỉ Email của bạn' : 'Nhập số điện thoại của bạn';
                const inputType = isEmail ? 'email' : 'text';
                
                const handleVerifyRecoveryContact = (e) => {
                    e.preventDefault();
                    setError('');
                    let foundUser = usersDB.find(u => u.email === email);
                    
                    // Xử lý xác minh chéo với database
                    if (!foundUser) {
                        if (isEmail && contactValue) {
                            foundUser = usersDB.find(u => u.email === contactValue);
                        } else if (!isEmail && contactValue) {
                            foundUser = usersDB.find(u => u.phone === contactValue);
                        }
                        if (!foundUser) {
                            setError('Không tìm thấy tài khoản khớp với thông tin này.');
                            return;
                        }
                    } else {
                        if (isEmail) {
                            if (contactValue !== foundUser.email) {
                                setError('Email không khớp với thông tin tài khoản đã đăng ký.');
                                return;
                            }
                        } else {
                            if (contactValue !== foundUser.phone) {
                                setError('Số điện thoại không khớp với thông tin tài khoản đã đăng ký.');
                                return;
                            }
                        }
                    }
                    
                    alert(`Hệ thống đã gửi mã khôi phục OTP (123456) đến ${contactValue}`);
                    setOtpValue('');
                    setStep('recovery_otp');
                };

                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10 bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm text-center">
                        <div className="w-16 h-16 bg-[#e8f0fe] text-[#1a73e8] rounded-full flex items-center justify-center mx-auto mb-4"><Icon name={isEmail ? "mail" : "smartphone"} size={32}/></div>
                        <h1 className="text-2xl font-medium mb-4 text-[#202124]">Xác nhận thông tin</h1>
                        <p className="text-[#5f6368] text-sm mb-6">
                            Vui lòng nhập chính xác {isEmail ? 'email' : 'số điện thoại'} để nhận mã khôi phục tài khoản.
                        </p>
                        <form onSubmit={handleVerifyRecoveryContact} className="space-y-6">
                            <div className="google-input-container">
                                <input type={inputType} value={contactValue} onChange={e => setContactValue(e.target.value)} placeholder=" " className="google-input" required autoFocus/>
                                <label className="google-label">{label}</label>
                            </div>
                            {error && <div className="text-[#d93025] text-xs font-medium text-left flex items-center gap-1"><Icon name="alert-circle" size={14}/> {error}</div>}
                            <div className="flex justify-between items-center pt-2">
                                <button type="button" onClick={() => {setError(''); setStep('recovery')}} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-3 py-2 rounded -ml-3">Quay lại</button>
                                <button type="submit" className="google-btn">Gửi mã</button>
                            </div>
                        </form>
                    </div>
                );
            }

            // GIAO DIỆN NHẬP OTP KHÔI PHỤC
            if (step === 'recovery_otp') {
                 return (
                     <div className="max-w-[450px] mx-auto animate-fade-in mt-10 bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm text-center">
                        <h1 className="text-2xl font-medium mb-4 text-[#202124]">Nhập mã khôi phục</h1>
                        <p className="text-[#5f6368] text-sm mb-6">Mã bảo mật gồm 6 chữ số đã được gửi cho bạn.</p>
                        <form onSubmit={(e) => {
                            e.preventDefault();
                            if (otpValue === '123456') {
                                let foundUser = usersDB.find(u => u.email === email);
                                if(!foundUser && contactMode === 'email') foundUser = usersDB.find(u => u.email === contactValue);
                                if(!foundUser && contactMode !== 'email') foundUser = usersDB.find(u => u.phone === contactValue);
                                if(!foundUser) foundUser = usersDB[0];

                                alert("Khôi phục tài khoản thành công!");
                                onBypassLogin(foundUser, true);
                            } else {
                                setError('Mã xác minh không chính xác. Vui lòng nhập 123456');
                            }
                        }} className="space-y-6">
                            <div className="google-input-container">
                                <input type="text" maxLength="6" value={otpValue} onChange={e => setOtpValue(e.target.value)} placeholder=" " className="google-input" required autoFocus/>
                                <label className="google-label">Nhập mã (123456)</label>
                            </div>
                            {error && <div className="text-[#d93025] text-xs font-medium text-left flex items-center gap-1"><Icon name="alert-circle" size={14}/> {error}</div>}
                            <div className="flex justify-between items-center pt-2">
                                <button type="button" onClick={() => { setError(''); setStep('recovery') }} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-3 py-2 rounded -ml-3">Thử cách khác</button>
                                <button type="submit" className="google-btn">Đăng nhập</button>
                            </div>
                        </form>
                     </div>
                 );
            }

            if (step === 'zalo_qr') {
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10 bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm text-center">
                        <h1 className="text-2xl font-medium text-blue-600 flex justify-center items-center gap-2"><Icon name="message-square"/> Zalo Login</h1>
                        <div className="flex justify-center my-6"><div className="p-4 border-4 border-blue-100 rounded-2xl relative"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=ZaloLoginDemo_${email || 'demo'}`} className="w-48 h-48" /><div className="absolute inset-0 bg-black/5 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                            <button type="button" onClick={() => { 
                                let foundUser = usersDB.find(u => u.email === email);
                                if (!foundUser) foundUser = usersDB.find(u => u.email === 'khachvip@gmail.com');
                                
                                if (foundUser) { 
                                    alert(`Quét QR thành công!\nBạn đang đăng nhập bằng: ${foundUser.email}`); 
                                    onBypassLogin(foundUser, true); 
                                } else {
                                    setError('Tài khoản không tồn tại.'); 
                                }
                            }} className="bg-blue-600 text-white font-bold px-4 py-2 rounded-full shadow-lg hover:bg-blue-700 transition-colors">Bấm để Giả lập Quét</button>
                        </div></div></div>
                        {error && <div className="text-[#d93025] text-xs font-medium mb-4 flex justify-center items-center gap-1"><Icon name="alert-circle" size={14}/> {error}</div>}
                        <button type="button" onClick={() => { setError(''); setStep('zalo_otp_input'); }} className="w-full py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 flex items-center justify-center gap-2"><Icon name="smartphone" size={18}/> Gửi mã về Zalo SMS</button>
                        <button type="button" onClick={() => { setError(''); setStep('recovery'); }} className="mt-6 text-[#5f6368] font-medium text-sm hover:underline">Quay lại</button>
                    </div>
                );
            }

            if (step === 'zalo_otp_input') {
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10 bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm text-center">
                        <h1 className="text-2xl font-medium mb-4">Xác minh Zalo</h1>
                        <form onSubmit={(e) => { e.preventDefault(); setTimeout(() => { if (otpValue === '123456') { const foundUser = usersDB.find(u => u.email === (email || 'khachvip@gmail.com')) || usersDB[0]; onBypassLogin(foundUser, true); } else setError('Mã xác minh sai.'); }, 800); }} className="space-y-6">
                            <div className="google-input-container"><input type="text" maxLength="6" value={otpValue} onChange={e => setOtpValue(e.target.value)} placeholder=" " className="google-input" required autoFocus/><label className="google-label">Nhập mã (123456)</label></div>
                            {error && <div className="text-[#d93025] text-xs mb-2 flex items-center gap-1 justify-center"><Icon name="alert-circle" size={14}/> {error}</div>}
                            <div className="flex justify-between items-center">
                                {/* FIX: Thêm type="button" để chống reload trang */}
                                <button type="button" onClick={() => { setError(''); setStep('zalo_qr'); }} className="text-[#1a73e8] text-sm px-2 py-2 font-medium hover:bg-blue-50 rounded">Quay lại</button>
                                <button type="submit" className="google-btn">Đăng nhập</button>
                            </div>
                        </form>
                    </div>
                );
            }
            return null;
        }

        function GoogleRegisterView({ onRegister, onBack, usersDB }) {
            const [formData, setFormData] = useState({ firstName: '', lastName: '', email: '', password: '', phone: '' });
            const [error, setError] = useState('');
            const handleRegister = (e) => {
                e.preventDefault();
                if (usersDB.some(u => u.email === formData.email)) { setError('Email này đã được sử dụng.'); return; }
                const newUser = { id: Date.now().toString(), email: formData.email, password: formData.password, role: 'user', mfaEnabled: false, phone: formData.phone, fullName: `${formData.lastName} ${formData.firstName}`.trim() };
                onRegister(newUser);
            };
            return (
                <div className="max-w-[500px] mx-auto animate-fade-in mt-10 bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm">
                    <h1 className="text-2xl font-medium mb-8">Tạo tài khoản</h1>
                    <form onSubmit={handleRegister} className="space-y-5">
                        <div className="grid grid-cols-2 gap-4">
                            <div className="google-input-container"><input type="text" id="lastName" placeholder=" " value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} className="google-input" required /><label htmlFor="lastName" className="google-label">Họ</label></div>
                            <div className="google-input-container"><input type="text" id="firstName" placeholder=" " value={formData.firstName} onChange={e => setFormData({...formData, firstName: e.target.value})} className="google-input" required /><label htmlFor="firstName" className="google-label">Tên</label></div>
                        </div>
                        <div className="google-input-container"><input type="email" id="regEmail" placeholder=" " value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="google-input" required /><label htmlFor="regEmail" className="google-label">Địa chỉ email</label></div>
                        <div className="google-input-container"><input type="text" id="regPhone" placeholder=" " value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="google-input" required /><label htmlFor="regPhone" className="google-label">Số điện thoại</label></div>
                        <div className="google-input-container"><input type="password" id="regPass" placeholder=" " value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} className="google-input" required /><label htmlFor="regPass" className="google-label">Mật khẩu</label></div>
                        {error && <div className="text-[#d93025] text-xs">{error}</div>}
                        <div className="flex justify-between items-center pt-6"><button type="button" onClick={onBack} className="text-[#1a73e8] text-sm px-2 py-2">Đăng nhập</button><button type="submit" className="google-btn">Tiếp theo</button></div>
                    </form>
                </div>
            );
        }

        function GoogleLoginStep2({ authData, onSuccess, onCancel }) {
            const [otp, setOtp] = useState(''); const [error, setError] = useState('');
            return (
                <div className="max-w-[450px] mx-auto animate-fade-in mt-10 bg-white p-10 rounded-[8px] shadow-sm text-center">
                    <h1 className="text-2xl font-medium mb-4">Xác minh 2 bước</h1>
                    <form onSubmit={(e) => { e.preventDefault(); if (otp === '123456') onSuccess(); else setError('Mã xác minh sai.'); }} className="space-y-6">
                        <div className="google-input-container"><input type="text" maxLength="6" value={otp} onChange={e => setOtp(e.target.value)} placeholder=" " className="google-input" required autoFocus /><label className="google-label">Nhập mã (123456)</label></div>
                        {error && <div className="text-[#d93025] text-xs">{error}</div>}
                        <div className="flex justify-between items-center"><button type="button" onClick={onCancel} className="text-[#1a73e8] text-sm">Quay lại</button><button type="submit" className="google-btn">Tiếp theo</button></div>
                    </form>
                </div>
            );
        }

        function CheckoutSuccessView({ onBack }) {
            return (
                <div className="max-w-lg mx-auto text-center py-16 animate-fade-in bg-white rounded-[8px] shadow-sm p-10 mt-10">
                    <div className="w-20 h-20 text-[#1e8e3e] flex items-center justify-center mx-auto mb-4"><Icon name="check-circle-2" size={80} /></div>
                    <h2 className="text-2xl font-medium mb-4">Đặt hàng thành công!</h2>
                    <button onClick={onBack} className="google-btn mt-6">Xem đơn hàng</button>
                </div>
            );
        }

        function CustomerDashboard({ user, ordersDB, onToggleMfa, onLogout }) {
            const myOrders = ordersDB.filter(o => o.email === user.email);
            return (
                <div className="max-w-3xl mx-auto animate-fade-in">
                    <h2 className="text-2xl font-medium mb-8">Xin chào, {user.details?.fullName}</h2>
                    <div className="bg-white p-8 rounded-[8px] shadow-sm border border-[#dadce0] mb-8">
                        <div className="flex justify-between items-center">
                            <div><h3 className="text-xl font-medium">Xác minh 2 bước (MFA)</h3><p className="text-sm text-[#5f6368] mt-1">Trạng thái: {user.details?.mfaEnabled ? 'BẬT' : 'TẮT'}</p></div>
                            <button onClick={onToggleMfa} className="google-btn">{user.details?.mfaEnabled ? 'Tắt MFA' : 'Bật MFA'}</button>
                        </div>
                    </div>
                    <h3 className="text-xl font-medium mb-4">Lịch sử đơn hàng</h3>
                    <div className="bg-white p-6 rounded-[8px] shadow-sm border border-[#dadce0]">
                        {myOrders.length === 0 ? <p className="text-[#5f6368]">Chưa có đơn hàng nào.</p> : myOrders.map((o, idx) => (
                            <div key={idx} className="border-b last:border-0 py-3 flex justify-between"><span className="font-medium">{o.items.join(', ')}</span><span className="text-[#1a73e8]">{o.total.toLocaleString()} ₫</span></div>
                        ))}
                    </div>
                    <button onClick={onLogout} className="mt-8 text-rose-500 font-medium">Đăng xuất</button>
                </div>
            );
        }

        function AdminDashboard({ usersDB, setUsersDB, ordersDB, safeFetch }) {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalMode, setModalMode] = useState('add');
            const [activeTab, setActiveTab] = useState('users'); 
            const [formData, setFormData] = useState({ id: '', email: '', password: '', role: 'user', mfaEnabled: false, phone: '', fullName: '' });

            const deleteUnverifiedUsers = () => {
                if(window.confirm("Xóa tất cả người dùng không bật MFA?")) {
                    const toDelete = usersDB.filter(user => user.mfaEnabled === false && user.role !== 'admin');
                    toDelete.forEach(u => safeFetch('delete_user', {id: u.id})); // Xóa trên MySQL
                    setUsersDB(usersDB.filter(user => user.mfaEnabled === true || user.role === 'admin')); // Xóa trên UI
                }
            };
            const deleteSingleUser = (id) => {
                if(window.confirm("Xóa người dùng này?")) {
                    safeFetch('delete_user', {id: id}); // Xóa trên MySQL
                    setUsersDB(usersDB.filter(u => u.id !== id)); // Xóa trên UI
                }
            };
            const handleOpenAdd = () => { setModalMode('add'); setFormData({ id: Date.now().toString(), email: '', password: '', role: 'user', mfaEnabled: false, phone: '', fullName: '' }); setIsModalOpen(true); };
            const handleOpenEdit = (user) => { setModalMode('edit'); setFormData({ ...user }); setIsModalOpen(true); };
            
            const handleSaveUser = (e) => {
                e.preventDefault();
                if (modalMode === 'add') {
                    safeFetch('add_user', formData); // Lưu vào MySQL
                    setUsersDB([...usersDB, formData]);
                } else {
                    safeFetch('update_user', formData); // Cập nhật vào MySQL
                    setUsersDB(usersDB.map(u => u.id === formData.id ? formData : u));
                }
                setIsModalOpen(false);
            };

            return (
                <div className="max-w-6xl mx-auto animate-fade-in relative">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <div className="flex items-center gap-6">
                            <h2 className="text-2xl font-medium text-[#202124]">Admin Workspace</h2>
                            <div className="flex bg-white rounded-lg border border-[#dadce0] p-1 shadow-sm">
                                <button onClick={() => setActiveTab('users')} className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${activeTab === 'users' ? 'bg-[#e8f0fe] text-[#1a73e8]' : 'text-[#5f6368] hover:bg-[#f8f9fa]'}`}>Tài khoản</button>
                                <button onClick={() => setActiveTab('orders')} className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${activeTab === 'orders' ? 'bg-[#e8f0fe] text-[#1a73e8]' : 'text-[#5f6368] hover:bg-[#f8f9fa]'}`}>Đơn hàng</button>
                            </div>
                        </div>
                        {activeTab === 'users' && (
                            <div className="space-x-3">
                                <button onClick={handleOpenAdd} className="bg-[#1a73e8] text-white hover:bg-[#1557b0] px-4 py-2 rounded-[4px] font-medium text-sm transition-colors shadow-sm"><Icon name="plus" size={16} className="inline-block mr-1 -mt-1"/> Thêm User Mới</button>
                                <button onClick={deleteUnverifiedUsers} className="bg-white border border-[#dadce0] text-[#d93025] hover:bg-rose-50 px-4 py-2 rounded-[4px] font-medium text-sm transition-colors shadow-sm">Xóa TK rác (No MFA)</button>
                            </div>
                        )}
                    </div>

                    {activeTab === 'users' ? (
                        <div className="bg-white rounded-[8px] border border-[#dadce0] overflow-hidden shadow-sm overflow-x-auto">
                            <table className="w-full text-left min-w-[600px]">
                                <thead className="bg-[#f8f9fa] border-b border-[#dadce0]">
                                    <tr>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm">Họ và Tên</th>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm">Email</th>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm">Role</th>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm">MFA</th>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {usersDB.map(u => (
                                        <tr key={u.id} className="border-b border-[#dadce0] last:border-0 hover:bg-[#f8f9fa] transition-colors">
                                            <td className="p-4 text-[#202124] text-sm font-medium">{u.fullName || 'N/A'}</td>
                                            <td className="p-4 text-[#5f6368] text-sm">{u.email}</td>
                                            <td className="p-4"><span className="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs uppercase font-medium">{u.role}</span></td>
                                            <td className="p-4">{u.mfaEnabled ? <span className="text-[#1e8e3e] text-xs font-medium border border-[#1e8e3e] px-2 py-1 rounded bg-[#e6f4ea]">Bật</span> : <span className="text-[#d93025] text-xs font-medium border border-[#d93025] px-2 py-1 rounded bg-[#fce8e6]">Tắt</span>}</td>
                                            <td className="p-4 text-right space-x-3">
                                                <button onClick={() => handleOpenEdit(u)} className="text-[#1a73e8] hover:underline text-sm font-medium">Sửa</button>
                                                {u.role !== 'admin' && <button onClick={() => deleteSingleUser(u.id)} className="text-[#d93025] hover:underline text-sm font-medium">Xóa</button>}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    ) : (
                        <div className="bg-white rounded-[8px] border border-[#dadce0] overflow-hidden shadow-sm overflow-x-auto">
                            <table className="w-full text-left min-w-[800px]">
                                <thead className="bg-[#f8f9fa] border-b border-[#dadce0]">
                                    <tr>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm">Mã Đơn</th>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm">Email Khách hàng</th>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm">Ngày Đặt</th>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm">Sản Phẩm</th>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm text-right">Tổng Tiền</th>
                                        <th className="p-4 font-medium text-[#5f6368] text-sm text-center">Trạng Thái</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {ordersDB.length === 0 ? (<tr><td colSpan="6" className="p-10 text-center text-[#5f6368] font-medium">Hệ thống chưa có đơn hàng nào.</td></tr>) : (
                                        ordersDB.map((order, idx) => (
                                            <tr key={idx} className="border-b border-[#dadce0] last:border-0 hover:bg-[#f8f9fa] transition-colors">
                                                <td className="p-4 text-[#202124] text-sm font-bold">{order.id}</td>
                                                <td className="p-4 text-[#1a73e8] text-sm">{order.email}</td>
                                                <td className="p-4 text-[#5f6368] text-sm">{order.date}</td>
                                                <td className="p-4 text-[#5f6368] text-sm max-w-[200px] truncate" title={order.items.join(', ')}>{order.items.join(', ')}</td>
                                                <td className="p-4 text-[#1e8e3e] font-medium text-sm text-right">{order.total.toLocaleString()} ₫</td>
                                                <td className="p-4 text-center"><span className="px-3 py-1 bg-[#e6f4ea] text-[#1e8e3e] rounded-full text-[11px] uppercase font-bold">{order.status}</span></td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {isModalOpen && (
                        <div className="modal-overlay">
                            <div className="bg-white rounded-[8px] shadow-2xl p-8 w-[500px] max-w-[90%] animate-fade-in relative">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-4 right-4 text-[#5f6368] hover:text-[#202124]"><Icon name="x" size={24}/></button>
                                <h2 className="text-2xl font-medium text-[#202124] mb-6">{modalMode === 'add' ? 'Thêm Người Dùng' : 'Sửa Thông Tin'}</h2>
                                <form onSubmit={handleSaveUser} className="space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-xs font-bold text-[#5f6368] mb-1">Họ và Tên</label><input type="text" value={formData.fullName} onChange={e => setFormData({...formData, fullName: e.target.value})} className="w-full p-3 border border-[#dadce0] rounded-[4px] focus:border-[#1a73e8] focus:outline-none" required /></div>
                                        <div><label className="block text-xs font-bold text-[#5f6368] mb-1">Số Zalo / SĐT</label><input type="text" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full p-3 border border-[#dadce0] rounded-[4px] focus:border-[#1a73e8] focus:outline-none" /></div>
                                    </div>
                                    <div><label className="block text-xs font-bold text-[#5f6368] mb-1">Email</label><input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full p-3 border border-[#dadce0] rounded-[4px] focus:border-[#1a73e8] focus:outline-none" required disabled={modalMode === 'edit'} /></div>
                                    <div><label className="block text-xs font-bold text-[#5f6368] mb-1">Mật khẩu</label><input type="text" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} className="w-full p-3 border border-[#dadce0] rounded-[4px] focus:border-[#1a73e8] focus:outline-none" required /></div>
                                    <div className="grid grid-cols-2 gap-4 pt-2">
                                        <div><label className="block text-xs font-bold text-[#5f6368] mb-2">Quyền truy cập</label><select value={formData.role} onChange={e => setFormData({...formData, role: e.target.value})} className="w-full p-3 border border-[#dadce0] rounded-[4px] focus:border-[#1a73e8] focus:outline-none bg-white"><option value="user">Khách hàng</option><option value="admin">Admin</option></select></div>
                                        <div className="flex items-center gap-3 mt-6"><input type="checkbox" id="mfaCheck" checked={formData.mfaEnabled} onChange={e => setFormData({...formData, mfaEnabled: e.target.checked})} className="w-5 h-5 accent-[#1a73e8]" /><label htmlFor="mfaCheck" className="text-sm font-medium text-[#202124]">Kích hoạt MFA</label></div>
                                    </div>
                                    <div className="flex justify-end gap-3 pt-6 border-t border-[#dadce0] mt-4">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 font-medium text-[#5f6368] hover:bg-[#f1f3f4] rounded-[4px] transition-colors">Hủy</button>
                                        <button type="submit" className="google-btn">Lưu thông tin</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
