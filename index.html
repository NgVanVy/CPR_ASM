<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiTech - Advanced Security E-commerce</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Open Sans', sans-serif; background-color: #f8f9fa; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* GOOGLE STYLE INPUTS */
        .google-input-container { position: relative; width: 100%; }
        .google-input { display: block; width: 100%; padding: 14px 14px 10px 14px; font-size: 16px; color: #202124; background-color: transparent; border: 1px solid #dadce0; border-radius: 4px; appearance: none; }
        .google-input:focus { outline: none; border: 2px solid #1a73e8; padding: 13px 13px 9px 13px; }
        .google-label { position: absolute; font-size: 16px; color: #5f6368; background-color: #fff; padding: 0 4px; top: 50%; left: 10px; transform: translateY(-50%); transition: 0.2s ease all; pointer-events: none; }
        .google-input:focus ~ .google-label, .google-input:not(:placeholder-shown) ~ .google-label { top: 0; font-size: 12px; color: #1a73e8; }
        .google-input:not(:focus):not(:placeholder-shown) ~ .google-label { color: #5f6368; }
        
        .google-btn { background-color: #1a73e8; color: white; font-weight: 500; border-radius: 4px; padding: 10px 24px; transition: background-color 0.2s; }
        .google-btn:hover { background-color: #1557b0; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15); }
        .google-btn:disabled { background-color: #e8eaed; color: #9aa0a6; cursor: not-allowed; box-shadow: none; }

        /* CAPTCHA STYLING */
        .captcha-box {
            background-color: #f1f5f9;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px);
            letter-spacing: 6px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            user-select: none;
        }
        .captcha-text {
            text-decoration: line-through;
            text-decoration-color: rgba(0,0,0,0.4);
            text-decoration-thickness: 2px;
            transform: skewX(-5deg);
            display: inline-block;
        }

        /* TIA LASER QUÉT QR CODE */
        @keyframes scanLaser {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .qr-scanner-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 3px;
            background: #3b82f6;
            box-shadow: 0 0 15px 3px rgba(59, 130, 246, 0.6);
            animation: scanLaser 2.5s ease-in-out infinite;
        }

        /* Product Card Styles */
        .product-card { background: #fff; border-radius: 12px; padding: 16px; transition: all 0.2s ease; border: 1px solid #edf2f7; height: 100%; display: flex; flex-direction: column; }
        .product-card:hover { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
        .product-image-container { width: 100%; height: 180px; border-radius: 8px; overflow: hidden; margin-bottom: 16px; background-color: #f8fafc; display: flex; align-items: center; justify-content: center; }
        .product-image-container img { max-height: 100%; max-width: 100%; object-fit: contain; mix-blend-mode: multiply; }
        
        /* Floating Animations */
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } }
        .animate-float { animation: float 3s ease-in-out infinite; display: block; }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const EMAILJS_PUBLIC_KEY = "Xt0zCFYrl0opcKC7b";
        const EMAILJS_SERVICE_ID = "service_y3q5jfc";
        const EMAILJS_TEMPLATE_ID = "template_qy5cexf";

        if(window.emailjs) { emailjs.init(EMAILJS_PUBLIC_KEY); }

        const sendEmailOTP = (toName, toEmail, otpCode) => {
            if(window.emailjs && EMAILJS_PUBLIC_KEY !== "YOUR_PUBLIC_KEY_HERE") {
                return window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    to_name: toName, to_email: toEmail, otp_code: otpCode
                }).then(() => console.log(`Đã gửi email OTP tới ${toEmail}`)).catch(err => console.error("Lỗi gửi mail:", err));
            }
            console.warn("Chưa cấu hình API EmailJS. Mã mặc định là 123456");
            return Promise.resolve();
        };

        const PRODUCTS = [
            { id: 1, name: 'MacBook Pro M3 Max 14"', price: 45990000, category: 'Laptop', image: 'https://images.unsplash.com/photo-1517336712461-a5123d80fe4e?w=500' },
            { id: 2, name: 'Dell XPS 15 OLED', price: 39990000, category: 'Laptop', image: 'https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=500' },
            { id: 3, name: 'ThinkPad X1 Carbon Gen 11', price: 35990000, category: 'Laptop', image: 'https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=500' },
            { id: 4, name: 'ASUS ROG Zephyrus G14', price: 41990000, category: 'Laptop', image: 'https://images.unsplash.com/photo-1600861194942-f884810f056b?w=500' },
            { id: 5, name: 'iPhone 15 Pro Max 256GB', price: 29990000, category: 'Điện thoại', image: 'https://images.unsplash.com/photo-1696446701796-da61225697cc?w=500' },
            { id: 6, name: 'Samsung Galaxy S24 Ultra', price: 31990000, category: 'Điện thoại', image: 'https://images.unsplash.com/photo-1610945415295-d9bbf067e59c?w=500' },
            { id: 7, name: 'Google Pixel 8 Pro', price: 24990000, category: 'Điện thoại', image: 'https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=500' },
            { id: 8, name: 'Xiaomi 14 Ultra', price: 27990000, category: 'Điện thoại', image: 'https://images.unsplash.com/photo-1681200115714-c1e19485b0b2?w=500' },
            { id: 9, name: 'Sony WH-1000XM5 ANC', price: 7490000, category: 'Audio', image: 'https://images.unsplash.com/photo-1618366712277-70778c392888?w=500' },
        ];

        const INITIAL_USERS_DB = [
            { id: 1, email: 'admin@group3.com', password: 'admin', role: 'admin', mfaEnabled: true, phone: '0999999999', fullName: 'System Admin' },
            { id: 2, email: 'khachvip@gmail.com', password: '123', role: 'user', mfaEnabled: true, phone: '0988888888', fullName: 'Nguyễn Văn VIP' }
        ];

        const Icon = ({ name, size = 24, className = "" }) => {
            const rootRef = useRef(null);
            useEffect(() => {
                if(window.lucide && rootRef.current) {
                    rootRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: rootRef.current });
                    const svg = rootRef.current.querySelector('svg');
                    if(svg) { svg.setAttribute('width', size); svg.setAttribute('height', size); }
                }
            }, [name, size]);
            return <span ref={rootRef} className={`inline-flex items-center justify-center ${className}`} style={{ color: 'inherit' }}></span>;
        };

        // ==========================================
        // COMPONENT CAPTCHA (BẢO MẬT CHỐNG BOT)
        // ==========================================
        function CaptchaWidget({ onVerify }) {
            const [captchaText, setCaptchaText] = useState('');
            const [userInput, setUserInput] = useState('');

            const generateCaptcha = () => {
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
                let text = '';
                for (let i = 0; i < 6; i++) { text += chars.charAt(Math.floor(Math.random() * chars.length)); }
                setCaptchaText(text);
                setUserInput('');
                onVerify(false); 
            };

            useEffect(() => { generateCaptcha(); }, []);

            const handleChange = (e) => {
                const val = e.target.value;
                setUserInput(val);
                onVerify(val === captchaText);
            };

            return (
                <div className="flex flex-col gap-3 mb-2 bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <label className="text-xs font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2">
                        <Icon name="shield-check" size={14} className="text-emerald-500" /> Xác minh bảo mật
                    </label>
                    <div className="flex gap-3 items-center">
                        <div className="captcha-box px-5 py-3 rounded-lg text-2xl font-black text-slate-700 w-full text-center border border-slate-300 shadow-inner">
                            <span className="captcha-text">{captchaText}</span>
                        </div>
                        <button type="button" onClick={generateCaptcha} className="p-3 bg-white text-slate-500 hover:text-blue-600 hover:bg-blue-50 border border-slate-200 rounded-lg transition-colors shadow-sm" title="Đổi mã khác">
                            <Icon name="refresh-cw" size={20} />
                        </button>
                    </div>
                    <input type="text" value={userInput} onChange={handleChange} placeholder="Nhập chính xác các ký tự ở trên" className="w-full p-3 border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 text-center font-medium" required />
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('shop'); 
            const [cart, setCart] = useState([]);
            
            const [usersDB, setUsersDB] = useState([]);
            const [ordersDB, setOrdersDB] = useState([]);
            const [dbConnected, setDbConnected] = useState(false);

            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem('hitech_asm_session');
                return saved ? JSON.parse(saved) : { isLoggedIn: false, email: '', role: '', details: null };
            });

            const [authData, setAuthData] = useState({ email: '', phoneHint: '', isCheckout: false, realOtp: '' });

            useEffect(() => {
                fetch('api.php?action=get_all')
                    .then(res => { if (!res.ok) throw new Error("Không tìm thấy api.php"); return res.json(); })
                    .then(data => {
                        if(!data.error) {
                            setUsersDB(data.users || []); setOrdersDB(data.orders || []); setDbConnected(true);
                        } else throw new Error(data.error);
                    })
                    .catch(err => {
                        const savedUsers = localStorage.getItem('hitech_asm_users_db');
                        const savedOrders = localStorage.getItem('hitech_asm_orders_db');
                        setUsersDB(savedUsers ? JSON.parse(savedUsers) : INITIAL_USERS_DB);
                        setOrdersDB(savedOrders ? JSON.parse(savedOrders) : []);
                        setDbConnected(false);
                    });
            }, []);

            useEffect(() => { if (!dbConnected && usersDB.length > 0) localStorage.setItem('hitech_asm_users_db', JSON.stringify(usersDB)); }, [usersDB, dbConnected]);
            useEffect(() => { if (!dbConnected && ordersDB.length > 0) localStorage.setItem('hitech_asm_orders_db', JSON.stringify(ordersDB)); }, [ordersDB, dbConnected]);

            const safeFetch = (action, data) => {
                if (!dbConnected) return Promise.resolve(); 
                return fetch(`api.php?action=${action}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }).catch(err => console.error(err));
            };

            const totalPrice = useMemo(() => cart.reduce((sum, item) => sum + item.price, 0), [cart]);

            const handleLogout = () => {
                setUser({ isLoggedIn: false, email: '', role: '', details: null });
                localStorage.removeItem('hitech_asm_session'); setView('shop'); setCart([]);
            };

            const processCheckout = (deliveryInfo) => {
                if (!user.isLoggedIn) { setView('login'); return; }
                const currentUserDetails = usersDB.find(u => u.email === user.email);
                
                if (currentUserDetails.role === 'user' && !currentUserDetails.mfaEnabled) {
                    alert("CẢNH BÁO BẢO MẬT: Bạn phải bật Xác minh 2 bước (MFA) trong phần Tài khoản mới được phép thanh toán đơn hàng này!");
                    setView('profile'); return;
                }

                if (currentUserDetails && currentUserDetails.mfaEnabled) {
                    const otpCode = Math.floor(100000 + Math.random() * 900000).toString();
                    alert(`Hệ thống đang gửi mã xác minh tới ${currentUserDetails.email}...`);
                    sendEmailOTP(currentUserDetails.fullName || "Khách hàng", currentUserDetails.email, otpCode);
                    // Lưu tạm deliveryInfo vào authData để dùng sau khi MFA thành công
                    setAuthData({ email: user.email, phoneHint: '***' + (currentUserDetails.phone || '000').slice(-3), isCheckout: true, realOtp: otpCode, deliveryInfo: deliveryInfo });
                    setView('2fa');
                } else {
                    handleCheckoutSuccess(deliveryInfo); 
                }
            };

            const handleCheckoutSuccess = (deliveryInfoObj) => {
                // Lấy thông tin giao hàng từ tham số hoặc từ state authData
                const info = deliveryInfoObj || authData.deliveryInfo || {};
                const newOrder = {
                    id: 'ORD-' + Math.floor(1000 + Math.random() * 9000), 
                    email: user.email, 
                    items: cart.map(c => c.name),
                    total: totalPrice, 
                    date: new Date().toLocaleDateString('vi-VN'), 
                    status: 'Chờ xác minh', // Trạng thái mặc định mới
                    address: info.address || 'Chưa cung cấp', 
                    phone: info.phone || 'Chưa cung cấp'
                };
                
                safeFetch('add_order', newOrder); 
                setOrdersDB([newOrder, ...ordersDB]); 
                setCart([]); setView('checkout_success');
            };

            const updateOrderStatus = (orderId, newStatus) => {
                const updatedOrders = ordersDB.map(o => o.id === orderId ? { ...o, status: newStatus } : o);
                setOrdersDB(updatedOrders);
                localStorage.setItem('hitech_asm_orders_db', JSON.stringify(updatedOrders));
                // Nếu backend api.php có hỗ trợ, có thể gọi safeFetch tại đây
            };

            const toggleUserMfa = () => {
                const updatedDB = usersDB.map(u => {
                    if (u.email === user.email) {
                        const updatedUser = { ...u, mfaEnabled: !u.mfaEnabled };
                        safeFetch('update_user', updatedUser); return updatedUser;
                    }
                    return u;
                });
                setUsersDB(updatedDB);
                const updatedUser = updatedDB.find(u => u.email === user.email);
                const newUserState = { ...user, details: updatedUser };
                setUser(newUserState);
                if (localStorage.getItem('hitech_asm_session')) localStorage.setItem('hitech_asm_session', JSON.stringify(newUserState));
            };

            const handleRegister = (newUser) => {
                safeFetch('add_user', newUser); setUsersDB([...usersDB, newUser]); 
                const verified = JSON.parse(localStorage.getItem('hitech_verified_devices') || '[]');
                if (!verified.includes(newUser.email)) { verified.push(newUser.email); localStorage.setItem('hitech_verified_devices', JSON.stringify(verified)); }
                alert("Tạo tài khoản thành công! Vui lòng đăng nhập."); setView('login');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* NAVBAR */}
                    <nav className="bg-[#0f172a] text-white sticky top-0 z-40 shadow-xl overflow-hidden relative border-b border-slate-700">
                        <div className="absolute top-1 right-2 text-[10px] font-bold z-50 flex items-center gap-1 opacity-70"><span className={`w-2 h-2 rounded-full ${dbConnected ? 'bg-emerald-500' : 'bg-rose-500 animate-pulse'}`}></span>{dbConnected ? 'MySQL Connected' : 'Offline Mode (No XAMPP)'}</div>
                        <div className="absolute inset-0 pointer-events-none z-0 overflow-hidden opacity-30">
                            <div className="absolute top-3 left-[10%] text-[#10b981] animate-float" style={{animationDelay: '0s'}}><Icon name="shield-check" size={24} /></div>
                            <div className="absolute top-6 left-[25%] text-blue-400 animate-float" style={{animationDelay: '1s'}}><Icon name="laptop" size={20} /></div>
                            <div className="absolute top-2 left-[45%] text-rose-400 animate-float" style={{animationDelay: '2s'}}><Icon name="lock" size={28} /></div>
                            <div className="absolute top-8 left-[65%] text-purple-400 animate-float" style={{animationDelay: '0.5s'}}><Icon name="smartphone" size={22} /></div>
                        </div>
                        <div className="container mx-auto px-6 py-4 flex justify-between items-center relative z-10">
                            <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('shop')}>
                                <div className="bg-white p-1.5 rounded-lg flex items-center justify-center shadow-sm"><img src="https://img.icons8.com/color/48/capybara.png" className="w-8 h-8" alt="Logo"/></div>
                                <h1 className="text-2xl font-bold tracking-tighter uppercase hidden sm:block">Hi<span className="text-[#10b981]">Tech</span></h1>
                            </div>
                            <div className="flex items-center gap-6 relative z-10">
                                {user.isLoggedIn && user.role === 'admin' && (<button onClick={() => setView('admin')} className="flex items-center gap-2 text-rose-400 hover:text-rose-300 text-sm font-bold transition-colors"><Icon name="database" size={18} /> <span className="hidden sm:inline">Admin Panel</span></button>)}
                                {user.isLoggedIn ? ( <button onClick={() => setView('profile')} className="flex items-center gap-2 text-emerald-400 hover:text-emerald-300 font-bold text-sm"><Icon name="user" size={20} /><span>{user.details?.fullName || user.email.split('@')[0]}</span></button>) : (<button onClick={() => setView('login')} className="flex items-center gap-2 text-slate-300 hover:text-white transition-colors text-sm font-bold uppercase tracking-wider"><Icon name="log-in" size={20} /> Đăng Nhập / Đăng Ký</button>)}
                                <button onClick={() => setView('cart')} className="relative flex items-center justify-center w-10 h-10 bg-slate-800 rounded-full hover:bg-slate-700 transition-all border border-slate-700">
                                    <Icon name="shopping-cart" size={20} className="text-[#10b981]" />
                                    {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full shadow-lg">{cart.length}</span>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow container mx-auto px-4 sm:px-6 py-8">
                        {view === 'shop' && <ShopView cart={cart} setCart={setCart} />}
                        {view === 'cart' && <CartView cart={cart} setCart={setCart} total={totalPrice} onCheckout={processCheckout} onBack={() => setView('shop')} />}
                        
                        {view === 'login' && <GoogleAuthFlow usersDB={usersDB} onNext={(data) => { setAuthData(data); setView('2fa'); }} onBypassLogin={(u, rememberMe) => { 
                            const newUser = { isLoggedIn: true, email: u.email, role: u.role, details: u };
                            setUser(newUser); 
                            if(rememberMe) localStorage.setItem('hitech_asm_session', JSON.stringify(newUser));
                            setView(u.role === 'admin' ? 'admin' : 'shop'); 
                        }} onGoRegister={() => setView('register')} onCancel={() => setView('shop')} />}
                        
                        {view === 'register' && <GoogleRegisterView onRegister={handleRegister} onBack={() => setView('login')} usersDB={usersDB} />}
                        
                        {view === '2fa' && <GoogleLoginStep2 authData={authData} onSuccess={() => { 
                            if (authData.isCheckout) { handleCheckoutSuccess(); } 
                            else {
                                const foundUser = usersDB.find(u => u.email === authData.email);
                                const newUser = { isLoggedIn: true, email: foundUser.email, role: foundUser.role, details: foundUser };
                                setUser(newUser); 
                                localStorage.setItem('hitech_asm_session', JSON.stringify(newUser));
                                
                                const verified = JSON.parse(localStorage.getItem('hitech_verified_devices') || '[]');
                                if (!verified.includes(foundUser.email)) { verified.push(foundUser.email); localStorage.setItem('hitech_verified_devices', JSON.stringify(verified)); }
                                setView(foundUser.role === 'admin' ? 'admin' : 'shop'); 
                            }
                        }} onCancel={() => setView(authData.isCheckout ? 'cart' : 'login')} />}
                        
                        {view === 'profile' && <CustomerDashboard user={user} ordersDB={ordersDB} onToggleMfa={toggleUserMfa} onLogout={handleLogout} />}
                        {/* TRUYỀN HÀM updateOrderStatus VÀO ADMIN DASHBOARD */}
                        {view === 'admin' && <AdminDashboard usersDB={usersDB} setUsersDB={setUsersDB} ordersDB={ordersDB} onUpdateOrderStatus={updateOrderStatus} />}
                        {view === 'checkout_success' && <CheckoutSuccessView onBack={() => setView('profile')} />}
                    </main>
                </div>
            );
        }

        // ==========================================
        // GIAO DIỆN CỬA HÀNG
        // ==========================================
        function ShopView({ cart, setCart }) {
            const laptops = PRODUCTS.filter(p => p.category === 'Laptop');
            const phones = PRODUCTS.filter(p => p.category === 'Điện thoại');

            return (
                <div className="animate-fade-in max-w-6xl mx-auto">
                    <div className="w-full rounded-2xl overflow-hidden mb-12 shadow-md relative">
                        <div className="bg-gradient-to-r from-pink-400 via-rose-400 to-pink-500 p-8 sm:p-12 text-center text-white relative">
                            <div className="absolute top-0 left-0 w-32 h-32 bg-white opacity-10 rounded-full -translate-x-16 -translate-y-16"></div>
                            <div className="absolute bottom-0 right-0 w-48 h-48 bg-white opacity-10 rounded-full translate-x-16 translate-y-16"></div>
                            <h2 className="text-3xl sm:text-4xl font-bold mb-4 flex justify-center items-center gap-3"><Icon name="gift" size={36} /> MỪNG QUỐC TẾ PHỤ NỮ 8/3 <Icon name="heart" size={32} /></h2>
                            <p className="text-pink-50 text-lg sm:text-xl font-medium max-w-2xl mx-auto leading-relaxed mb-8">Tôn vinh phái đẹp! Giảm ngay <strong className="text-yellow-300 text-2xl mx-1">20%</strong> cho tất cả thiết bị. Tặng kèm gói bảo mật giao dịch MFA trọn đời!</p>
                            <div className="inline-flex items-center gap-3 bg-white/20 backdrop-blur-sm border border-white/40 px-6 py-3 rounded-full text-white font-bold tracking-widest cursor-pointer hover:bg-white/30 transition-colors" onClick={() => alert("Đã copy mã: WOMENDAY20")}>MÃ: WOMENDAY20 <Icon name="copy" size={18} /></div>
                        </div>
                    </div>

                    <div className="mb-12">
                        <h3 className="text-xl font-bold text-[#1e293b] mb-6 flex items-center gap-2"><Icon name="laptop" className="text-emerald-500" /> Laptop</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

                    <div className="mb-10">
                        <h3 className="text-xl font-bold text-[#1e293b] mb-6 flex items-center gap-2"><Icon name="smartphone" className="text-emerald-500" /> Điện thoại</h3>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {phones.map(p => (
                                <div key={p.id} className="product-card group">
                                    <div className="product-image-container"><img src={p.image} alt={p.name} className="group-hover:scale-105 transition-transform duration-500" /></div>
                                    <h4 className="font-semibold text-slate-800 text-sm mb-2 line-clamp-2">{p.name}</h4>
                                    <div className="mt-auto pt-4 flex flex-col gap-3">
                                        <p className="text-lg font-black text-slate-900">{p.price.toLocaleString()} ₫</p>
                                        <button onClick={() => setCart([...cart, {...p, cartId: Math.random()}])} className="w-full py-2.5 bg-[#0f172a] text-white font-medium rounded-lg hover:bg-[#1a73e8] flex items-center justify-center gap-2 text-sm transition-colors"><Icon name="shopping-cart" size={16} /> Thêm vào giỏ</button>
                                    </div>
                                </div>
                            ))}

        function CartView({ cart, setCart, total, onCheckout, onBack }) {
            // STATE QUẢN LÝ THÔNG TIN GIAO HÀNG
            const [deliveryInfo, setDeliveryInfo] = useState({ address: '', phone: '' });

            const handleCheckoutClick = () => {
                if (!deliveryInfo.address || !deliveryInfo.phone) {
                    alert("Vui lòng điền đầy đủ Số điện thoại và Địa chỉ giao hàng để tiếp tục!");
                    return;
                }
                onCheckout(deliveryInfo);
            };

            return (
                <div className="max-w-3xl mx-auto bg-white p-6 sm:p-8 rounded-[16px] shadow-sm border border-slate-200 animate-fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold flex items-center gap-2 text-slate-800"><Icon name="shopping-cart" className="text-emerald-500"/> Giỏ hàng</h2>
                        <button onClick={onBack} className="text-sm font-semibold text-slate-500 hover:text-slate-800 hover:underline">Tiếp tục mua sắm</button>
                    </div>
                    {cart.length === 0 ? <p className="text-slate-400 text-center py-10">Giỏ hàng trống.</p> : (
                        <div>
                            {cart.map(item => (
                                <div key={item.cartId} className="flex justify-between items-center border-b border-slate-100 py-4">
                                    <div className="flex items-center gap-4"><div className="w-12 h-12 bg-slate-50 rounded p-1 flex items-center justify-center hidden sm:flex"><img src={item.image} className="max-h-full mix-blend-multiply" /></div><span className="font-semibold text-slate-700 text-sm sm:text-base">{item.name}</span></div>
                                    <div className="flex items-center gap-4 sm:gap-6"><span className="font-black text-slate-900">{item.price.toLocaleString()} ₫</span><button onClick={() => setCart(cart.filter(c => c.cartId !== item.cartId))} className="text-slate-400 hover:text-rose-500 transition-colors p-2"><Icon name="trash-2" size={18}/></button></div>
                                </div>
                            ))}
                            
                            {/* FORM ĐIỀN THÔNG TIN GIAO HÀNG TRƯỚC KHI THANH TOÁN */}
                            <div className="mt-8 bg-slate-50 p-6 rounded-xl border border-slate-200 shadow-inner">
                                <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="map-pin" size={18} className="text-[#1a73e8]"/> Thông tin giao hàng</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">Số điện thoại liên hệ <span className="text-rose-500">*</span></label>
                                        <input type="text" value={deliveryInfo.phone} onChange={e=>setDeliveryInfo({...deliveryInfo, phone: e.target.value})} className="w-full p-3 border border-slate-300 rounded-lg focus:border-[#1a73e8] outline-none transition-colors" placeholder="Nhập số điện thoại người nhận..." required/>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-600 mb-1">Địa chỉ nhận hàng <span className="text-rose-500">*</span></label>
                                        <input type="text" value={deliveryInfo.address} onChange={e=>setDeliveryInfo({...deliveryInfo, address: e.target.value})} className="w-full p-3 border border-slate-300 rounded-lg focus:border-[#1a73e8] outline-none transition-colors" placeholder="Nhập số nhà, tên đường, phường/xã, quận/huyện..." required/>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-6 flex flex-col sm:flex-row justify-between items-center text-xl bg-slate-50 p-6 rounded-xl border border-slate-100 gap-4">
                                <span className="font-bold text-slate-600 text-sm">TỔNG THANH TOÁN:</span><span className="font-black text-2xl text-rose-500">{total.toLocaleString()} ₫</span>
                            </div>
                            <button onClick={handleCheckoutClick} className="w-full mt-6 py-4 bg-[#1a73e8] text-white font-bold rounded-xl text-base hover:bg-[#1557b0] transition-colors shadow-md flex justify-center items-center gap-2"><Icon name="lock" size={18} /> XÁC THỰC BẢO MẬT & THANH TOÁN</button>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // KHỐI QUẢN LÝ LUỒNG ĐĂNG NHẬP / QUÊN MẬT KHẨU
        // ==========================================
        function GoogleAuthFlow({ usersDB, onNext, onBypassLogin, onGoRegister, onCancel }) {
            const [step, setStep] = useState('chooser'); 
            const [otpValue, setOtpValue] = useState('');
            const [savedAccounts, setSavedAccounts] = useState(() => { const saved = localStorage.getItem('hitech_saved_accounts'); return saved ? JSON.parse(saved) : []; });
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [showPwd, setShowPwd] = useState(false); // State hiển thị mật khẩu
            // State cho Strict Verification (Slide 25)
            const [recoveryInput, setRecoveryInput] = useState(''); 
            const [isCaptchaValid, setIsCaptchaValid] = useState(false);

            useEffect(() => { if (savedAccounts.length === 0 && step === 'chooser') setStep('email'); }, [savedAccounts, step]);

            const saveAccountToLocal = (userEmail, userFullName) => {
                const newAcc = { email: userEmail, fullName: userFullName };
                const filtered = savedAccounts.filter(acc => acc.email !== userEmail);
                const updated = [newAcc, ...filtered];
                setSavedAccounts(updated); localStorage.setItem('hitech_saved_accounts', JSON.stringify(updated));
            };
            const removeAccount = (emailToRemove) => {
                const updated = savedAccounts.filter(acc => acc.email !== emailToRemove);
                setSavedAccounts(updated); localStorage.setItem('hitech_saved_accounts', JSON.stringify(updated));
            };

            const handleCheckEmail = (e) => { e.preventDefault(); setError(''); if (!email) return; setStep('pwd'); };

            const handleLogin = (e) => {
                e.preventDefault();
                
                // KIỂM TRA TRẠNG THÁI KHÓA TÀI KHOẢN (BRUTE-FORCE PROTECTION)
                const lockKey = `lock_${email}`;
                const attemptsKey = `attempts_${email}`;
                const lockTime = localStorage.getItem(lockKey);

                if (lockTime && Date.now() < parseInt(lockTime)) {
                    const remainingMinutes = Math.ceil((parseInt(lockTime) - Date.now()) / 60000);
                    setError(`Tài khoản đã bị khóa bảo mật do nhập sai nhiều lần. Vui lòng thử lại sau ${remainingMinutes} phút.`);
                    return;
                }

                setLoading(true); setError('');
                
                setTimeout(() => {
                    const foundUser = usersDB.find(u => u.email === email && u.password === password);
                    if (!foundUser) {
                        // XỬ LÝ ĐẾM SỐ LẦN SAI VÀ KHÓA TÀI KHOẢN
                        let attempts = parseInt(localStorage.getItem(attemptsKey) || '0') + 1;
                        localStorage.setItem(attemptsKey, attempts);
                        if (attempts >= 5) {
                            localStorage.setItem(lockKey, Date.now() + 15 * 60 * 1000); // Khóa 15 phút
                            setError('Bạn đã nhập sai quá 5 lần. Tài khoản bị khóa 15 phút để đảm bảo an toàn.');
                        } else {
                            setError(`Mật khẩu không chính xác. Bạn còn ${5 - attempts} lần thử.`);
                        }
                        setLoading(false); return;
                    }
                    
                    // Nếu đăng nhập đúng -> Xóa bộ đếm sai
                    localStorage.removeItem(attemptsKey);
                    localStorage.removeItem(lockKey);
                    
                    saveAccountToLocal(foundUser.email, foundUser.fullName || foundUser.email.split('@')[0]);

                    const verifiedDevices = JSON.parse(localStorage.getItem('hitech_verified_devices') || '[]');
                    const isDeviceVerified = verifiedDevices.includes(foundUser.email);

                    if (foundUser.mfaEnabled) {
                        if (isDeviceVerified) { onBypassLogin(foundUser, true); } 
                        else {
                            const otpCode = Math.floor(100000 + Math.random() * 900000).toString();
                            alert(`[Phát hiện thiết bị lạ] Hệ thống đang gửi mã xác minh tới ${foundUser.email}...`);
                            sendEmailOTP(foundUser.fullName || "Khách hàng", foundUser.email, otpCode);
                            onNext({ email: foundUser.email, phoneHint: '***' + (foundUser.phone || '000').slice(-3), isCheckout: false, realOtp: otpCode });
                        }
                    } else { alert("CẢNH BÁO: Tài khoản này chưa bật MFA. Cho phép đăng nhập thẳng."); onBypassLogin(foundUser, true); }
                    setLoading(false);
                }, 800);
            };

            if (step === 'chooser') {
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10">
                        <div className="bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm text-center">
                            <h1 className="text-2xl font-medium text-[#202124] mb-2">Chọn tài khoản</h1><p className="text-[#5f6368] text-base mb-6">để tiếp tục đến HiTech Store</p>
                            <ul className="text-left mb-4">
                                {savedAccounts.map(acc => {
                                    const displayName = acc.fullName || acc.email || 'User';
                                    return (
                                        <li key={acc.email} className="flex items-center justify-between p-3 border-b border-[#dadce0] hover:bg-[#f8f9fa] cursor-pointer group transition-colors">
                                            <div className="flex items-center gap-3 w-full" onClick={() => { setEmail(acc.email); setStep('pwd'); }}>
                                                <div className="w-8 h-8 rounded-full bg-[#1a73e8] text-white flex items-center justify-center font-bold text-sm">{displayName.charAt(0).toUpperCase()}</div>
                                                <div className="overflow-hidden"><p className="text-sm font-medium text-[#3c4043] truncate">{displayName}</p><p className="text-xs text-[#5f6368] truncate">{acc.email}</p></div>
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); removeAccount(acc.email); }} className="text-[#5f6368] hover:text-[#d93025] opacity-0 group-hover:opacity-100 transition-opacity p-2"><Icon name="x" size={18}/></button>
                                        </li>
                                    );
                                })}
                                <li onClick={() => { setEmail(''); setStep('email'); }} className="flex items-center gap-3 p-4 hover:bg-[#f8f9fa] cursor-pointer transition-colors border-b border-[#dadce0]">
                                    <Icon name="user-plus" size={20} className="text-[#5f6368]"/><p className="text-sm font-medium text-[#3c4043]">Sử dụng một tài khoản khác</p>
                                </li>
                            </ul>
                            <div className="text-left flex justify-between items-center mt-4">
                                <button type="button" onClick={onGoRegister} className="text-[#1a73e8] font-medium text-sm hover:underline">Tạo tài khoản mới</button>
                                <button type="button" onClick={onCancel} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-4 py-2 rounded transition-colors">Quay lại</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'email') {
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10">
                        <div className="bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm">
                            <div className="text-center mb-8">
                                <div className="flex justify-center mb-4"><img src="https://img.icons8.com/color/48/capybara.png" className="w-12 h-12 drop-shadow-sm" /></div>
                                <h1 className="text-2xl font-medium text-[#202124] mb-2">Đăng nhập</h1><p className="text-[#202124] text-base">Sử dụng Tài khoản HiTech của bạn</p>
                            </div>
                            <form onSubmit={handleCheckEmail} className="space-y-5">
                                <div className="google-input-container"><input type="email" id="gEmail" placeholder=" " value={email} onChange={e => setEmail(e.target.value)} className="google-input" required autoFocus/><label htmlFor="gEmail" className="google-label">Email hoặc số điện thoại</label></div>
                                <div onClick={() => { setError(''); setStep('find_email'); }} className="text-sm text-[#1a73e8] font-medium hover:bg-blue-50 cursor-pointer w-fit py-1 px-2 -ml-2 rounded">Bạn quên địa chỉ email?</div>
                                <div className="flex justify-between items-center pt-8">
                                    <button type="button" onClick={onGoRegister} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-2 py-2 rounded transition-colors -ml-2">Tạo tài khoản</button>
                                    <div className="flex gap-2 items-center"><button type="button" onClick={onCancel} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-4 py-2 rounded transition-colors">Quay lại</button><button type="submit" className="google-btn">Tiếp theo</button></div>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            if (step === 'pwd') {
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10">
                        <div className="bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm">
                            <div className="text-center mb-8">
                                <div className="flex justify-center mb-4"><img src="https://img.icons8.com/color/48/capybara.png" className="w-12 h-12 drop-shadow-sm" /></div>
                                <h1 className="text-2xl font-medium text-[#202124] mb-2">Chào mừng</h1>
                                <div className="inline-flex items-center gap-2 border border-[#dadce0] px-3 py-1 rounded-full cursor-pointer hover:bg-gray-50 transition-colors" onClick={() => setStep(savedAccounts.length > 0 ? 'chooser' : 'email')}>
                                    <Icon name="user-circle" size={16} className="text-[#5f6368]"/><span className="text-sm font-medium text-[#3c4043] max-w-[200px] truncate">{email}</span><Icon name="chevron-down" size={14} className="text-[#5f6368]"/>
                                </div>
                            </div>
                            <form onSubmit={handleLogin} className="space-y-5">
                                <div className="google-input-container">
                                    <input type={showPwd ? "text" : "password"} id="gPass" placeholder=" " value={password} onChange={e => setPassword(e.target.value)} className="google-input pr-10" required autoFocus/>
                                    <label htmlFor="gPass" className="google-label">Nhập mật khẩu của bạn</label>
                                    <button type="button" onClick={() => setShowPwd(!showPwd)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                                        <Icon name={showPwd ? "eye-off" : "eye"} size={20}/>
                                    </button>
                                </div>
                                {error && <div className="text-[#d93025] text-xs font-medium flex items-center gap-1"><Icon name="alert-triangle" size={14}/> {error}</div>}
                                
                                <div className="flex justify-between items-center pt-6">
                                    <button type="button" onClick={() => { setError(''); setStep('strict_verify'); }} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-2 py-2 rounded transition-colors -ml-2">Quên mật khẩu?</button>
                                    <div className="flex gap-2 items-center"><button type="button" onClick={() => setStep(savedAccounts.length > 0 ? 'chooser' : 'email')} disabled={loading} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-4 py-2 rounded transition-colors">Quay lại</button><button type="submit" disabled={loading} className="google-btn">{loading ? 'Đang tải...' : 'Tiếp theo'}</button></div>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            if (step === 'strict_verify' || step === 'find_email') {
                const isFindEmail = step === 'find_email';
                return (
                    <div className="max-w-[450px] mx-auto animate-fade-in mt-10">
                        <div className="bg-white p-10 rounded-[8px] border border-[#dadce0] shadow-sm">
                            <div className="text-center mb-8">
                                <div className="flex justify-center mb-4"><div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center"><Icon name="shield-alert" size={32}/></div></div>
                                <h1 className="text-2xl font-medium text-[#202124] mb-2">{isFindEmail ? 'Tìm tài khoản của bạn' : 'Xác minh nghiêm ngặt'}</h1>
                                <p className="text-[#5f6368] text-sm leading-relaxed">
                                    {isFindEmail ? 'Nhập số điện thoại hoặc email khôi phục.' : 'Để chống Spam, bạn phải tự gõ lại chính xác Email hoặc Số điện thoại đã đăng ký để chứng minh thân phận.'}
                                </p>
                            </div>
                            <form onSubmit={(e) => {
                                e.preventDefault(); setError('');
                                if (!isCaptchaValid) { setError('Mã CAPTCHA không chính xác. Vui lòng thử lại.'); return; }
                                
                                const foundUser = usersDB.find(u => u.phone === recoveryInput || u.email === recoveryInput);
                                
                                if (isFindEmail) {
                                    if (foundUser) { setEmail(foundUser.email); setStep('pwd'); } 
                                    else { setError('Không tìm thấy tài khoản nào khớp với thông tin này.'); }
                                } else {
                                    const targetUser = usersDB.find(u => u.email === email);
                                    if (recoveryInput === email || (targetUser && recoveryInput === targetUser.phone)) {
                                        setStep('recovery'); 
                                    } else {
                                        setError('Thông tin không khớp với tài khoản bạn đang cố khôi phục.');
                                    }
                                }
                            }} className="space-y-6">
                                <div className="google-input-container">
                                    <input type="text" id="gRecoveryInput" placeholder=" " value={recoveryInput} onChange={e => setRecoveryInput(e.target.value)} className="google-input" required autoFocus/>
                                    <label htmlFor="gRecoveryInput" className="google-label">Tự gõ chính xác SĐT hoặc Email</label>
                                </div>
                                
                                <CaptchaWidget onVerify={setIsCaptchaValid} />

                                {error && <div className="text-[#d93025] text-sm font-medium flex items-center gap-1 bg-red-50 p-2 rounded"><Icon name="alert-circle" size={16}/> {error}</div>}
                                
                                <div className="flex justify-end items-center pt-4 gap-2">
                                    <button type="button" onClick={() => { setStep(isFindEmail ? 'email' : 'pwd'); setError(''); }} className="text-[#1a73e8] font-medium text-sm hover:bg-blue-50 px-4 py-2 rounded transition-colors">Hủy bỏ</button>
                                    <button type="submit" className="google-btn">Tiếp tục</button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            if (step === 'recovery') {
                const targetEmail = email || ''; 
                const hintEmail = targetEmail ? targetEmail.substring(0, 3) + "••••••••••@gmail.com" : "vyn••••••••••@gmail.com";

                return (
                    <div className="max-w-[700px] mx-auto animate-fade-in mt-10">
                        <div className="bg-[#1f1f1f] text-white p-10 rounded-2xl shadow-2xl flex flex-col md:flex-row gap-10 relative border border-gray-700">
                            <div className="flex-1">
                                <div className="flex items-center gap-2 mb-6"><span className="text-blue-500 font-bold text-2xl">G</span></div>
                                <h1 className="text-3xl font-medium mb-6">Khôi phục tài khoản</h1>
                                <div className="inline-flex items-center gap-2 border border-gray-600 bg-black/30 px-3 py-1.5 rounded-full cursor-pointer hover:bg-gray-800 transition-colors" onClick={() => setStep('email')}>
                                    <Icon name="user-circle" size={18} className="text-gray-400"/><span className="text-sm font-medium truncate">{targetEmail || 'Chưa nhập email'}</span><Icon name="chevron-down" size={14} className="text-gray-400"/>
                                </div>
                            </div>
                            <div className="flex-1">
                                <p className="text-lg mb-4 text-gray-300">Chọn cách lấy lại mật khẩu:</p>
                                <ul className="space-y-3">
                                    <li onClick={() => setStep('zalo_qr')} className="flex items-start gap-4 p-4 hover:bg-gray-800 rounded-xl cursor-pointer transition-colors border border-blue-500/30 bg-blue-500/10 group">
                                        <Icon name="smartphone" size={24} className="mt-1 text-blue-400 group-hover:scale-110 transition-transform"/>
                                        <div><p className="text-base font-bold text-blue-300">Đăng nhập siêu tốc bằng Zalo</p><p className="text-xs text-gray-400 mt-1">Quét mã QR hoặc nhận OTP qua tin nhắn</p></div>
                                    </li>
                                    <li onClick={() => {
                                        if(!targetEmail) { alert("Lỗi: Không tìm thấy Email."); return; }
                                        const foundUser = usersDB.find(u => u.email === targetEmail) || { fullName: "Khách hàng", phone: "000" };
                                        const otpCode = Math.floor(100000 + Math.random() * 900000).toString();
                                        alert(`Hệ thống đang gửi mã xác minh tới ${targetEmail}...`);
                                        sendEmailOTP(foundUser.fullName, targetEmail, otpCode).then(() => { onNext({ email: targetEmail, phoneHint: '***' + (foundUser.phone).slice(-3), isCheckout: false, realOtp: otpCode }); });

                    fetch('api.php?action=send_sms', { method: 'POST', body: JSON.stringify({ phone: formData.phone, otp: otpCode }) })
                    .then(res => res.json()).then(data => setStep('verify'));

rt gap-3"><Icon name="alert-triangle" size={18} className="mt-0.5 shrink-0" /> Tài khoản của bạn đang gặp rủi ro. Vui lòng bật MFA để thanh toán.</div>}</div></div>)}

                                    <span className="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-bold border border-blue-200"><Icon name="shield-check" size={14} className="inline mr-1"/> Chỉ bạn được xem dữ liệu này</span>
                                </div>
                                {myOrders.length === 0 ? <p className="text-slate-500">Chưa có đơn hàng nào.</p> : (myOrders.map((order, idx) => (
                                <div key={idx} className="border border-slate-100 bg-slate-50 rounded-lg p-5 mb-4 hover:shadow-md transition-shadow">
                                    <div className="flex justify-between mb-2"><span className="font-bold text-slate-700">{order.id}</span><span className={`font-semibold px-2 py-0.5 rounded text-sm ${order.status === 'Chờ xác minh' ? 'text-amber-600 bg-amber-50 border border-amber-200' : 'text-emerald-600 bg-emerald-50 border border-emerald-200'}`}>{order.status}</span></div>
                                    <p className="text-sm text-slate-500 leading-relaxed mb-3">{order.items.join(', ')}</p>
                                    <div className="bg-white p-3 rounded text-sm text-slate-600 border border-slate-200 mb-3">
                                        <p><strong className="text-slate-800">Giao đến:</strong> {order.address || 'N/A'}</p>
                                        <p><strong className="text-slate-800">Liên hệ:</strong> {order.phone || 'N/A'}</p>
                                    </div>
                                    <p className="text-right font-black text-slate-900 mt-3 text-lg">{order.total.toLocaleString()} ₫</p>
                                </div>)))}</div>)}</div></div></div>
            );
        }

        function AdminDashboard({ usersDB, ordersDB, onUpdateOrderStatus }) {
            const [activeTab, setActiveTab] = useState('users'); 
            return (
                <div className="max-w-6xl mx-auto animate-fade-in relative"><div className="flex justify-between items-center mb-8"><h2 className="text-3xl font-bold text-slate-800">Admin Workspace</h2><div className="flex bg-white rounded-lg border border-slate-200 p-1 shadow-sm"><button onClick={() => setActiveTab('users')} className={`px-5 py-2 text-sm font-semibold rounded-md transition-colors ${activeTab === 'users' ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>Tài khoản</button><button onClick={() => setActiveTab('orders')} className={`px-5 py-2 text-sm font-semibold rounded-md transition-colors ${activeTab === 'orders' ? 'bg-slate-900 text-white' : 'text-slate-600 hover:bg-slate-50'}`}>Đơn hàng</button></div></div>{activeTab === 'users' ? (<div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm overflow-x-auto"><table className="w-full text-left min-w-[600px]"><thead className="bg-slate-50 border-b border-slate-200"><tr><th className="p-4 font-bold text-slate-600 text-sm uppercase tracking-wider">Họ Tên</th><th className="p-4 font-bold text-slate-600 text-sm uppercase tracking-wider">Email</th><th className="p-4 font-bold text-slate-600 text-sm uppercase tracking-wider">Role</th><th className="p-4 font-bold text-slate-600 text-sm uppercase tracking-wider">MFA Status</th></tr></thead><tbody>{usersDB.map(u => (<tr key={u.id} className="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors"><td className="p-4 text-slate-800 font-medium text-sm">{u.fullName}</td><td className="p-4 text-slate-500 text-sm">{u.email}</td><td className="p-4"><span className={`px-2 py-1 rounded text-xs uppercase font-bold ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-600'}`}>{u.role}</span></td><td className="p-4">{u.mfaEnabled ? <span className="text-emerald-600 text-xs font-bold border border-emerald-200 px-2 py-1 rounded bg-emerald-50">Đã kích hoạt</span> : <span className="text-rose-500 text-xs font-bold border border-rose-200 px-2 py-1 rounded bg-rose-50">Chưa bảo vệ</span>}</td></tr>))}</tbody></table></div>
                    ) : (<div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm overflow-x-auto"><table className="w-full text-left min-w-[800px]"><thead className="bg-slate-50 border-b border-slate-200"><tr><th className="p-4 font-bold text-slate-600 text-sm uppercase tracking-wider">Mã Đơn</th><th className="p-4 font-bold text-slate-600 text-sm uppercase tracking-wider">Thông tin bảo mật Khách hàng</th><th className="p-4 font-bold text-slate-600 text-sm uppercase tracking-wider">Sản Phẩm</th><th className="p-4 font-bold text-slate-600 text-sm uppercase tracking-wider text-right">Tổng Tiền</th><th className="p-4 font-bold text-slate-600 text-sm uppercase tracking-wider text-center">Xác minh</th></tr></thead><tbody>{ordersDB.length === 0 ? (<tr><td colSpan="5" className="p-10 text-center text-slate-500 font-medium">Chưa có đơn hàng nào.</td></tr>) : (ordersDB.map((order, idx) => (
                        <tr key={idx} className="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                            <td className="p-4 text-slate-800 text-sm font-bold">{order.id}</td>
                            <td className="p-4">
                                <div className="text-blue-600 font-medium text-sm mb-1">{order.email}</div>
                                <div className="text-slate-500 text-xs"><Icon name="phone" size={12} className="inline mr-1"/>{order.phone || 'N/A'}</div>
                                <div className="text-slate-500 text-xs max-w-[250px] truncate" title={order.address}><Icon name="map-pin" size={12} className="inline mr-1"/>{order.address || 'N/A'}</div>
                            </td>
                            <td className="p-4 text-slate-500 text-sm max-w-[200px] truncate">{order.items.join(', ')}</td>
                            <td className="p-4 text-slate-900 font-black text-sm text-right">{order.total.toLocaleString()} ₫</td>
                            <td className="p-4 text-center">
                                {order.status === 'Chờ xác minh' ? (
                                    <button onClick={() => onUpdateOrderStatus(order.id, 'Đã xác minh')} className="px-3 py-1.5 bg-emerald-500 text-white text-xs font-bold rounded hover:bg-emerald-600 transition-colors shadow-sm">Bấm để Xác minh</button>
                                ) : (
                                    <span className="text-emerald-600 text-xs font-bold border border-emerald-200 px-2 py-1 rounded bg-emerald-50">{order.status}</span>
                                )}
                            </td>
                        </tr>
                    )))}</tbody></table></div>)}</div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
